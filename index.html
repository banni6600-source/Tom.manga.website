<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TOM MANGA | Professional System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0c; color: #eee; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(17,17,20,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .form-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; width: 100%; color: #fff; outline: none; transition: 0.3s; }
        .form-input:focus { border-color: #ff2d55; }
        .btn-red { background: #ff2d55; color: white; font-weight: 800; border-radius: 12px; padding: 12px; transition: 0.3s; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .btn-red:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .card-shadow { box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    </style>
</head>
<body class="pb-24">

<nav class="glass fixed top-0 w-full h-20 flex items-center justify-between px-6 z-[100]">
    <h1 class="text-xl font-900 italic tracking-tighter text-red-500">TOM MANGA</h1>
    <div class="flex items-center gap-4">
        <div id="userCoin" class="text-yellow-500 font-900 text-sm italic bg-yellow-500/10 px-3 py-1 rounded-full">💰 0</div>
        <button onclick="toggleModal('profileModal')" class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center border border-zinc-700">👤</button>
    </div>
</nav>

<div id="profileModal" class="fixed inset-0 bg-black/90 z-[1000] hidden flex items-center justify-center p-4 backdrop-blur-md">
    <div class="glass w-full max-w-sm p-8 rounded-[32px] space-y-6 card-shadow">
        <div class="flex justify-between items-center">
            <h2 class="text-xl font-900 italic text-red-500">USER PROFILE</h2>
            <button onclick="toggleModal('profileModal')" class="text-zinc-500 hover:text-white">✕</button>
        </div>
        
        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
            <p class="text-[9px] text-zinc-500 uppercase font-black tracking-widest mb-1">Your Unique ID (Tap to Copy)</p>
            <p id="myUid" onclick="copyText(this.innerText)" class="text-xs font-mono text-zinc-300 cursor-pointer hover:text-red-400 break-all bg-black/30 p-2 rounded">---</p>
            <div id="myRole" class="mt-3 text-[9px] bg-red-500/20 text-red-400 w-fit px-2 py-0.5 rounded font-black tracking-widest uppercase">Member</div>
        </div>

        <div class="space-y-3">
            <p class="text-[9px] text-zinc-500 uppercase font-black tracking-widest">Coin Transfer</p>
            <input id="targetId" placeholder="Receiver's User ID" class="form-input text-xs">
            <input id="transferAmt" type="number" placeholder="Amount to Send" class="form-input text-xs">
            <button onclick="transferCoin()" class="w-full btn-red">Transfer Now</button>
        </div>
        <button onclick="auth.signOut().then(()=>location.reload())" class="w-full text-zinc-600 text-[10px] font-black uppercase tracking-widest hover:text-red-500">Logout</button>
    </div>
</div>

<main class="mt-28 px-4 max-w-4xl mx-auto space-y-12">
    
    <div id="adminArea" class="hidden glass p-8 rounded-[40px] border-red-500/20 border-2 space-y-8">
        <div>
            <h3 class="text-red-500 font-900 italic mb-6 tracking-widest uppercase text-sm border-b border-red-500/10 pb-2">Admin Control Panel</h3>
            
            <div class="space-y-3 mb-10">
                <p class="text-[10px] font-black text-zinc-500 tracking-widest uppercase">1. Post New Manga</p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <input id="mTitle" placeholder="Manga Title" class="form-input text-xs">
                    <input type="file" id="mThumb" class="form-input text-xs pt-2">
                </div>
                <textarea id="mDesc" placeholder="Brief Summary..." class="form-input text-xs h-20"></textarea>
                <button onclick="uploadManga()" id="mBtn" class="btn-red w-full">Publish Manga</button>
            </div>

            <div class="space-y-3 pt-6 border-t border-white/5">
                <p class="text-[10px] font-black text-zinc-500 tracking-widest uppercase">2. Add Chapter to Manga</p>
                <input id="targetMangaId" placeholder="Manga ID (Get from Library)" class="form-input text-xs">
                <div class="grid grid-cols-2 gap-3">
                    <input id="cTitle" placeholder="Chapter (e.g. Ep-01)" class="form-input text-xs">
                    <input id="cPrice" type="number" placeholder="Price (0 = Free)" class="form-input text-xs">
                </div>
                <input type="file" id="cPages" multiple class="form-input text-xs pt-2">
                <button onclick="uploadChapter()" id="cBtn" class="btn-red w-full">Add Chapter</button>
            </div>
        </div>
    </div>

    <div id="mGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6"></div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, runTransaction, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhb5iJxVxIdaXjMIGZP6nmI28DGQSR41k",
        authDomain: "tommangasite.firebaseapp.com",
        projectId: "tommangasite",
        storageBucket: "tommangasite.firebasestorage.app",
        messagingSenderId: "678188860278",
        appId: "1:678188860278:web:75ffe0d7ae003ed71df057"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const imgbbKey = "မင်းရဲ့_IMGBB_KEY_ဒီမှာထည့်";

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById("myUid").innerText = user.uid;
            onSnapshot(doc(db, "users", user.uid), d => {
                const data = d.data() || {};
                document.getElementById("userCoin").innerText = "💰 " + (data.coin || 0);
                document.getElementById("myRole").innerText = data.role || "Member";
                if(data.role === 'owner') document.getElementById("adminArea").classList.remove("hidden");
            });
        }
    });

    // --- Core Logic ---

    window.copyText = (text) => {
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard!");
    };

    window.toggleModal = (id) => document.getElementById(id).classList.toggle("hidden");

    window.transferCoin = async () => {
        const target = document.getElementById("targetId").value.trim();
        const amt = parseInt(document.getElementById("transferAmt").value);
        if(!target || isNaN(amt) || amt <= 0) return alert("Please check ID or Amount");

        try {
            await runTransaction(db, async (t) => {
                const meRef = doc(db, "users", auth.currentUser.uid);
                const toRef = doc(db, "users", target);
                const meDoc = await t.get(meRef);
                if (meDoc.data().coin < amt) throw "Insufficient Coins!";
                t.update(meRef, { coin: increment(-amt) });
                t.update(toRef, { coin: increment(amt) });
            });
            alert("Transfer Successful! ✅");
            toggleModal('profileModal');
        } catch (e) { alert(e); }
    };

    async function uploadToImgBB(file) {
        let f = new FormData(); f.append("image", file);
        const r = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: f });
        const d = await r.json(); return d.data.url;
    }

    window.uploadManga = async () => {
        const title = document.getElementById("mTitle").value;
        const file = document.getElementById("mThumb").files[0];
        if(!title || !file) return alert("Title and Thumbnail required!");
        
        document.getElementById("mBtn").innerText = "Uploading...";
        const url = await uploadToImgBB(file);
        await addDoc(collection(db, "manga"), {
            title, thumbnail: url, description: document.getElementById("mDesc").value, createdAt: serverTimestamp()
        });
        location.reload();
    };

    window.uploadChapter = async () => {
        const mId = document.getElementById("targetMangaId").value.trim();
        const files = document.getElementById("cPages").files;
        if(!mId || files.length === 0) return alert("Manga ID and Pages required!");

        document.getElementById("cBtn").innerText = "Processing Pages...";
        const urls = [];
        for(let f of files) { urls.push(await uploadToImgBB(f)); }
        
        await addDoc(collection(db, "manga", mId, "chapters"), {
            title: document.getElementById("cTitle").value,
            price: parseInt(document.getElementById("cPrice").value) || 0,
            pages: urls,
            createdAt: serverTimestamp()
        });
        alert("Chapter Added Successfully! 🚀");
        location.reload();
    };

    // Library Grid Logic
    onSnapshot(query(collection(db, "manga"), orderBy("createdAt", "desc")), snap => {
        const g = document.getElementById("mGrid"); g.innerHTML = "";
        snap.forEach(d => {
            const m = d.data();
            g.innerHTML += `
                <div class="glass rounded-2xl overflow-hidden group cursor-pointer" onclick="copyText('${d.id}')">
                    <img src="${m.thumbnail}" class="w-full aspect-[3/4] object-cover">
                    <div class="p-3">
                        <p class="text-[10px] font-black uppercase truncate">${m.title}</p>
                        <p class="text-[8px] text-zinc-500 mt-1 font-mono">ID: ${d.id}</p>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
