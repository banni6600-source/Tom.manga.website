<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TOM MANGA | Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff2d55; --glow: rgba(255, 45, 85, 0.4); }
        body { background: #060609; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(6, 6, 9, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .manga-card { background: rgba(255,255,255,0.02); border-radius: 24px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .manga-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px var(--glow); }
        .form-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 14px 20px; width: 100%; outline: none; transition: 0.3s; color: #fff; font-size: 14px; }
        .form-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }
        .reader-img { width: 100%; display: block; opacity: 0; transition: opacity 0.8s ease; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">

<div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-[10000] transition-all duration-500 opacity-0 -translate-y-10 pointer-events-none text-center">
    <div class="bg-zinc-900 border border-white/10 px-8 py-4 rounded-full shadow-2xl flex items-center gap-4 text-[10px] font-black uppercase text-white tracking-widest">
        <span id="toastIcon"></span><p id="toastMsg"></p>
    </div>
</div>

<div id="tgModal" class="fixed inset-0 bg-black/95 z-[10000] flex items-center justify-center hidden p-6 animate-fade">
    <div class="bg-[#0f0f15] border border-white/10 p-10 rounded-[40px] max-w-sm w-full text-center space-y-6">
        <h3 class="text-xl font-black uppercase italic tracking-tighter">Contact Admin</h3>
        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest">Coin ဝယ်ရန် သို့မဟုတ် VIP တင်ရန်</p>
        <div class="bg-white/5 p-5 rounded-2xl border border-white/5 select-all cursor-pointer hover:border-[#0088cc] transition-all">
            <p class="text-[9px] text-zinc-500 mb-1 font-black">TELEGRAM LINK</p>
            <p class="text-sm font-black text-[#0088cc]">t.me/gogolover1514</p>
        </div>
        <button onclick="window.open('https://t.me/gogolover1514')" class="w-full bg-[#0088cc] py-4 rounded-2xl text-[10px] font-black uppercase">Open Telegram</button>
        <button onclick="document.getElementById('tgModal').classList.add('hidden')" class="w-full text-[10px] font-black opacity-30 tracking-widest">CLOSE</button>
    </div>
</div>

<nav class="glass fixed top-0 w-full h-24 flex items-center justify-between px-8 z-[100]">
    <div class="flex items-center gap-3">
        <div class="w-2.5 h-8 bg-red-600 rounded-full shadow-[0_0_15px_var(--glow)]"></div>
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">TOM MANGA</h1>
    </div>
    <div class="flex items-center gap-5">
        <div id="userStats" class="hidden sm:block text-right">
            <p id="userCoin" class="text-lg font-black text-yellow-500 italic leading-none">💰 0</p>
            <p id="vipStatus" class="text-[7px] font-black opacity-40 uppercase tracking-tighter mt-1"></p>
        </div>
        <button onclick="document.getElementById('userDropdown').classList.toggle('hidden')" class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-white/5 border border-white/10 text-xl">⋮</button>
        
        <div id="userDropdown" class="hidden absolute right-8 top-24 w-72 bg-[#0c0c12] border border-white/10 rounded-[32px] shadow-2xl p-4 text-left">
            <div id="dropStatus" class="text-[9px] font-black p-4 text-center bg-white/5 rounded-2xl mb-3 tracking-[0.2em] opacity-60">MEMBER</div>
            <div id="adminPanel" class="hidden border border-red-600/20 rounded-2xl mb-3 p-4 bg-red-600/5 space-y-3">
                <p class="text-[8px] font-black text-red-500 uppercase tracking-widest">Admin Control</p>
                <button onclick="toggleMangaForm()" class="w-full bg-red-600 py-3 rounded-xl text-[10px] font-black uppercase">Post Manga</button>
                <input id="targetUid" placeholder="User ID" class="form-input text-[10px] py-2 bg-black/40">
                <div class="flex gap-2">
                    <button onclick="updateUserCoin()" class="flex-1 bg-yellow-600 py-2 rounded-xl text-[8px] font-black">ADD COIN</button>
                    <button onclick="addMonthlyVIP()" class="flex-1 bg-purple-600 py-2 rounded-xl text-[8px] font-black">GIVE VIP</button>
                </div>
            </div>
            <button onclick="document.getElementById('tgModal').classList.remove('hidden')" class="w-full text-left p-4 text-[10px] font-black uppercase text-yellow-500 hover:bg-white/5 rounded-xl">💎 Buy Coin / VIP</button>
            <button id="authBtn" onclick="showAuth()" class="w-full text-left p-4 text-[10px] font-black uppercase hover:bg-white/5 rounded-xl">🚪 Login / Register</button>
            <button id="logoutBtn" onclick="auth.signOut().then(()=>location.reload())" class="hidden w-full text-left p-4 text-[10px] font-black uppercase text-red-500 hover:bg-red-500/10 rounded-xl">🚪 Sign Out</button>
        </div>
    </div>
</nav>

<main class="mt-40 px-6 max-w-7xl mx-auto space-y-12">
    <div class="relative max-w-2xl mx-auto">
        <input id="searchInput" oninput="searchManga()" placeholder="SEARCH TITLES..." class="form-input pl-14 py-5 text-xs font-black tracking-widest bg-white/5 border-white/10 rounded-full">
        <span class="absolute left-6 top-1/2 -translate-y-1/2 opacity-30">🔍</span>
    </div>

    <div id="mangaForm" class="hidden bg-white/5 p-10 rounded-[40px] border border-white/10 space-y-6 animate-fade">
        <div class="grid md:grid-cols-2 gap-6">
            <input id="mTitle" placeholder="Manga Title" class="form-input">
            <div class="space-y-1">
                <p class="text-[9px] font-black opacity-30 ml-4">THUMBNAIL UPLOAD</p>
                <input type="file" id="mThumbFile" class="form-input py-2.5 text-xs">
            </div>
        </div>
        <textarea id="mDesc" placeholder="Brief summary..." class="form-input h-28"></textarea>
        <button onclick="uploadMangaWithImage()" id="publishBtn" class="w-full bg-red-600 py-4 rounded-2xl text-[10px] font-black uppercase">Publish Manga</button>
    </div>

    <div id="mGrid" class="grid grid-cols-2 md:grid-cols-5 gap-8"></div>
</main>

<div id="mDetail" class="fixed inset-0 bg-[#060609] z-[500] hidden overflow-y-auto">
    <button onclick="closeDetail()" class="fixed top-8 left-8 z-[510] bg-white/5 hover:bg-white/10 w-12 h-12 flex items-center justify-center rounded-full border border-white/10">✕</button>
    <div id="detailContent" class="max-w-4xl mx-auto p-6 pt-32 pb-20 animate-fade"></div>
</div>

<div id="reader" class="fixed inset-0 bg-black z-[1100] hidden overflow-y-auto">
    <div class="fixed top-0 w-full p-6 glass flex justify-between items-center z-[1101]">
        <button onclick="closeReader()" class="text-[10px] font-black text-red-500 uppercase tracking-widest">Exit Reader</button>
        <span id="rTitle" class="text-[10px] font-bold opacity-40"></span>
        <div class="w-2.5 h-2.5 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_var(--glow)]"></div>
    </div>
    <div id="rImages" class="pt-24"></div>
</div>

<div id="authModal" class="fixed inset-0 bg-[#060609]/98 z-[9999] flex items-center justify-center hidden p-6">
    <div class="w-full max-w-md bg-white/5 p-12 rounded-[40px] border border-white/10 text-center">
        <h2 id="authTitle" class="text-4xl font-black mb-8 italic tracking-tighter">LOGIN</h2>
        <input id="uName" placeholder="Username" class="form-input mb-4 text-center">
        <input id="password" type="password" placeholder="Password" class="form-input mb-8 text-center">
        <button onclick="handleAuth()" class="w-full bg-red-600 py-5 rounded-2xl font-black uppercase text-xs">Confirm</button>
        <p onclick="toggleAuthMode()" id="toggleText" class="mt-8 text-zinc-500 text-[10px] cursor-pointer uppercase font-black tracking-widest">Register New Account</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, setDoc, getDoc, getDocs, serverTimestamp, updateDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhb5iJxVxIdaXjMIGZP6nmI28DGQSR41k",
        authDomain: "tommangasite.firebaseapp.com",
        projectId: "tommangasite",
        storageBucket: "tommangasite.firebasestorage.app",
        messagingSenderId: "678188860278",
        appId: "1:678188860278:web:75ffe0d7ae003ed71df057"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const imgbbKey = "မင်းရဲ့_IMGBB_KEY_ဒီမှာထည့်"; // <--- ImgBB Key ထည့်ရန်

    let userData = null; let isReg = false;

    // --- AUTH & VIP MONITORING ---
    onAuthStateChanged(auth, user => {
        if(user) {
            onSnapshot(doc(db, "users", user.uid), d => {
                userData = d.data();
                document.getElementById("userCoin").innerText = "💰 " + (userData.coin || 0);
                const now = new Date().getTime();
                if(userData.role === 'vip' && userData.vipExpiry > now) {
                    const days = Math.ceil((userData.vipExpiry - now) / (1000*60*60*24));
                    document.getElementById("vipStatus").innerText = `VIP: ${days} DAYS LEFT`;
                }
                if(userData.role === 'owner') {
                    document.getElementById("adminPanel").classList.remove("hidden");
                    document.getElementById("dropStatus").innerText = "OWNER ACCOUNT";
                }
            });
            document.getElementById("authBtn").classList.add("hidden");
            document.getElementById("logoutBtn").classList.remove("hidden");
        }
    });

    // --- IMGBB UPLOAD FUNCTION ---
    async function uploadToImgBB(file) {
        let formData = new FormData();
        formData.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
        const data = await res.json();
        return data.data.url;
    }

    // --- MANGA STREAM ---
    onSnapshot(query(collection(db, "manga"), orderBy("createdAt", "desc")), snap => {
        const grid = document.getElementById("mGrid");
        grid.innerHTML = "";
        snap.forEach(d => {
            const m = d.data();
            grid.innerHTML += `<div onclick="viewDetail('${d.id}')" class="manga-card cursor-pointer animate-fade">
                <img src="${m.thumbnail}" class="aspect-[3/4] object-cover w-full opacity-80 hover:opacity-100 transition-all duration-500">
                <div class="p-4 text-[10px] font-black uppercase truncate tracking-wider manga-title">${m.title}</div>
            </div>`;
        });
    });

    // --- PREMIUM DETAIL VIEW ---
    window.viewDetail = async id => {
        const m = (await getDoc(doc(db, "manga", id))).data();
        document.getElementById("mDetail").classList.remove("hidden");
        const isAdmin = userData?.role === 'owner';
        
        document.getElementById("detailContent").innerHTML = `
            <div class="relative">
                ${isAdmin ? `
                <button onclick="document.getElementById('chapterFormBox').classList.toggle('hidden')" class="absolute -top-12 right-0 bg-red-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-2xl hover:scale-110 transition-all z-[520]">
                    <span class="text-2xl text-white">✏️</span>
                </button>` : ''}

                <div class="flex flex-col md:flex-row gap-10 items-center md:items-start mb-16">
                    <img src="${m.thumbnail}" class="w-56 aspect-[3/4] object-cover rounded-[32px] shadow-2xl border border-white/5">
                    <div class="flex-1 text-center md:text-left pt-4">
                        <h2 class="text-5xl font-black uppercase italic tracking-tighter mb-4 text-white">${m.title}</h2>
                        <p class="text-zinc-500 text-sm italic leading-relaxed max-w-xl">${m.description || 'No summary.'}</p>
                    </div>
                </div>

                <div id="chapterFormBox" class="hidden bg-white/5 p-8 rounded-[32px] border border-white/10 mb-10 space-y-5 animate-fade">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="cTitle" placeholder="Chapter Name" class="form-input">
                        <input id="cPrice" type="number" placeholder="Price" class="form-input">
                    </div>
                    <div class="p-6 border-2 border-dashed border-white/10 rounded-2xl text-center">
                        <input type="file" id="cPageFiles" multiple class="text-[10px]">
                    </div>
                    <button onclick="saveNewChapter('${id}')" id="chapBtn" class="w-full bg-red-600 py-4 rounded-xl text-[10px] font-black uppercase">Publish Episode</button>
                </div>

                <div class="flex items-center justify-between mb-8 px-2 border-b border-white/5 pb-4">
                    <h3 class="text-lg font-black uppercase italic italic tracking-tighter">Episode List</h3>
                </div>
                <div id="chapList" class="space-y-3"></div>
            </div>`;
        loadChapters(id);
    };

    const loadChapters = async (mId) => {
        const chaps = await getDocs(query(collection(db, "manga", mId, "chapters"), orderBy("createdAt", "desc")));
        const list = document.getElementById("chapList");
        list.innerHTML = "";
        chaps.forEach(cDoc => {
            const c = cDoc.data();
            const div = document.createElement("div");
            div.className = "group bg-white/3 hover:bg-white/5 p-5 rounded-2xl flex justify-between items-center cursor-pointer border border-white/5 hover:border-red-600/40 transition-all";
            div.onclick = () => unlockChapter(mId, cDoc.id, c.price);
            div.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center font-black text-[10px] group-hover:text-red-500">#</div>
                    <p class="font-black text-xs uppercase tracking-widest">${c.title}</p>
                </div>
                <span class="text-[9px] font-black ${c.price > 0 ? 'text-yellow-500' : 'text-green-500'} bg-white/5 px-3 py-1.5 rounded-lg">
                    ${c.price > 0 ? '💰 ' + c.price : 'FREE'}
                </span>`;
            list.appendChild(div);
        });
    };

    // --- SECURE LOGIC & UTILS ---
    window.unlockChapter = async (mId, cId, price) => {
        if(!userData) return showAuth();
        const now = new Date().getTime();
        const isVIP = userData.role === 'vip' && userData.vipExpiry > now;
        if(price === 0 || userData.role === 'owner' || isVIP || (userData.unlockedChapters && userData.unlockedChapters[cId])) return openReader(mId, cId);
        
        if(userData.coin < price) { notify("Coin မလောက်ပါ၊ Admin ကို ဆက်သွယ်ပါ"); setTimeout(()=>document.getElementById('tgModal').classList.remove('hidden'), 1000); return; }
        
        if(confirm(`Unlock for ${price} coins?`)) {
            await runTransaction(db, async t => {
                const uRef = doc(db, "users", auth.currentUser.uid);
                const fresh = (await t.get(uRef)).data();
                const current = fresh.unlockedChapters || {};
                current[cId] = true;
                t.update(uRef, { coin: fresh.coin - price, unlockedChapters: current });
            });
            openReader(mId, cId);
        }
    };

    window.openReader = async (mId, cId) => {
        const c = (await getDoc(doc(db, "manga", mId, "chapters", cId))).data();
        document.getElementById("rTitle").innerText = c.title;
        document.getElementById("rImages").innerHTML = c.pages.map(u => `<img src="${u}" class="reader-img" onload="this.style.opacity=1" loading="lazy">`).join('');
        document.getElementById("reader").classList.remove("hidden");
    };

    window.uploadMangaWithImage = async () => {
        const file = document.getElementById("mThumbFile").files[0];
        const title = document.getElementById("mTitle").value;
        if(!file || !title) return notify("အချက်အလက် ပြည့်စုံအောင် ဖြည့်ပါ");
        document.getElementById("publishBtn").innerText = "UPLOADING...";
        const url = await uploadToImgBB(file);
        await addDoc(collection(db, "manga"), { title, thumbnail: url, description: document.getElementById("mDesc").value, createdAt: serverTimestamp() });
        location.reload();
    };

    window.saveNewChapter = async id => {
        const files = document.getElementById("cPageFiles").files;
        if(files.length === 0) return notify("ပုံများ ရွေးချယ်ပါ");
        document.getElementById("chapBtn").innerText = "UPLOADING EPISODE...";
        const urls = [];
        for(let f of files) { urls.push(await uploadToImgBB(f)); }
        await addDoc(collection(db, "manga", id, "chapters"), { title: document.getElementById("cTitle").value, price: parseInt(document.getElementById("cPrice").value) || 0, pages: urls, createdAt: serverTimestamp() });
        viewDetail(id);
    };

    window.updateUserCoin = async () => {
        const uid = document.getElementById("targetUid").value.trim();
        const amt = parseInt(prompt("Coin Amount?"));
        if(uid && !isNaN(amt)) { await updateDoc(doc(db, "users", uid), { coin: amt }); notify("Updated!"); }
    };

    window.addMonthlyVIP = async () => {
        const uid = document.getElementById("targetUid").value.trim();
        if(!uid) return notify("ID Error");
        const exp = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);
        await updateDoc(doc(db, "users", uid), { role: "vip", vipExpiry: exp });
        notify("VIP Granted!");
    };

    window.searchManga = () => {
        const q = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll(".manga-card").forEach(c => {
            c.style.display = c.querySelector(".manga-title").innerText.toLowerCase().includes(q) ? "block" : "none";
        });
    };

    window.notify = (m, i="✅") => { const t = document.getElementById("toast"); document.getElementById("toastMsg").innerText = m; document.getElementById("toastIcon").innerText = i; t.classList.remove("opacity-0", "-translate-y-10"); setTimeout(() => t.classList.add("opacity-0", "-translate-y-10"), 3000); };
    window.toggleMangaForm = () => document.getElementById("mangaForm").classList.toggle("hidden");
    window.closeDetail = () => document.getElementById("mDetail").classList.add("hidden");
    window.closeReader = () => { document.getElementById("reader").classList.add("hidden"); window.scrollTo(0,0); };
    window.showAuth = () => document.getElementById("authModal").classList.remove("hidden");
    window.toggleAuthMode = () => { isReg = !isReg; document.getElementById("authTitle").innerText = isReg ? "REGISTER" : "LOGIN"; };
    window.handleAuth = async () => {
        const u = document.getElementById("uName").value.trim().toLowerCase(); const p = document.getElementById("password").value;
        try {
            if(isReg) { const r = await createUserWithEmailAndPassword(auth, `${u}@tommanga.com`, p); await setDoc(doc(db, "users", r.user.uid), { username: u, coin: 0, role: "member", unlockedChapters: {} }); location.reload(); }
            else { await signInWithEmailAndPassword(auth, `${u}@tommanga.com`, p); document.getElementById("authModal").classList.add("hidden"); }
        } catch(e) { notify("Invalid Credentials", "❌"); }
    };
</script>
</body>
</html>
