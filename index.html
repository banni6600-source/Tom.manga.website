<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOM MANGA CLEAN</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<h1 class="text-center text-3xl mt-5 font-bold">🔥 TOM MANGA</h1>

<!-- AUTH -->
<div id="authBox" class="text-center mt-10">
<input id="username" placeholder="Username" class="p-3 text-black rounded"><br><br>
<input id="password" type="password" placeholder="Password" class="p-3 text-black rounded"><br><br>

<button onclick="register()" class="bg-green-500 px-6 py-2 rounded">Register</button>
<button onclick="login()" class="bg-blue-500 px-6 py-2 rounded">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden p-5">

<p id="coin">💰 0</p>

<button onclick="showProfile()" class="bg-blue-500 px-3 py-1 mt-3">Profile</button>
<button onclick="addCoin()" class="bg-yellow-500 px-3 py-1 mt-3">💰 Add Coin (Admin)</button>

<div id="profileBox" class="hidden mt-5 border p-3">
  <h2>👤 Profile</h2>
  <p id="pName"></p>
  <p id="pCoin"></p>
</div>

<button onclick="addManga()" class="bg-red-500 px-4 py-2 mt-3">Add Manga (Admin)</button>

<div id="mangaList" class="mt-5"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhb5iJxVxIdaXjMIGZP6nmI28DGQSR41k",
  authDomain: "tommangasite.firebaseapp.com",
  projectId: "tommangasite"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userData = null;

// SAFE CHECK
function checkUser(){
  if(!currentUser || !userData){
    alert("Login first ❗");
    return false;
  }
  return true;
}

// REGISTER
window.register = async () => {
  let u = username.value;
  let p = password.value;

  const res = await createUserWithEmailAndPassword(auth, u+"@test.com", p);

  await setDoc(doc(db,"users",res.user.uid),{
    username:u,
    coin:100,
    role:"member",
    favorites:{},
    purchased:{}
  });

  alert("Registered ✅");
};

// LOGIN
window.login = async () => {
  let u = username.value;
  let p = password.value;
  await signInWithEmailAndPassword(auth, u+"@test.com", p);
};

// AUTH STATE
onAuthStateChanged(auth, async (user)=>{
  if(user){
    currentUser = user;

    authBox.classList.add("hidden");
    app.classList.remove("hidden");

    const ref = doc(db,"users",user.uid);
    let snap = await getDoc(ref);

    if(!snap.exists()){
      await setDoc(ref,{
        username:"user",
        coin:0,
        favorites:{},
        purchased:{}
      });
      snap = await getDoc(ref);
    }

    userData = snap.data();

    coin.innerText = "💰 "+(userData.coin || 0);

    loadManga();
  }
});

// LOAD MANGA
async function loadManga(){
  const snap = await getDocs(collection(db,"manga"));
  mangaList.innerHTML="";

  snap.forEach(docu=>{
    const m = docu.data();

    mangaList.innerHTML += `
    <div class="border p-3 mt-2">
      <h3>${m.title}</h3>

      <button onclick="read('${docu.id}',${m.price})" class="bg-yellow-500 px-3 py-1 mt-2">
        Read (${m.price})
      </button>

      <button onclick="toggleFav('${docu.id}')" class="bg-pink-500 px-3 py-1 mt-2">
        ❤️ Favorite
      </button>
    </div>
    `;
  });
}

// READ
window.read = async (id, price)=>{
  if(!checkUser()) return;

  let bought = userData.purchased || {};

  if(bought[id]){
    alert("Already unlocked 🔓");
    return;
  }

  if((userData.coin || 0) < price){
    alert("Not enough coin");
    return;
  }

  userData.coin -= price;
  bought[id] = true;

  await setDoc(doc(db,"users",currentUser.uid), {
    ...userData,
    purchased: bought
  });

  coin.innerText = "💰 "+userData.coin;

  alert("Unlocked ✅");
};

// FAVORITE
window.toggleFav = async (id)=>{
  if(!checkUser()) return;

  let fav = userData.favorites || {};

  if(fav[id]){
    delete fav[id];
  } else {
    fav[id] = true;
  }

  await setDoc(doc(db,"users",currentUser.uid), {
    ...userData,
    favorites: fav
  });

  userData.favorites = fav;

  alert("Favorite Updated ❤️");
};

// PROFILE
window.showProfile = ()=>{
  profileBox.classList.toggle("hidden");

  pName.innerText = "Name: "+userData.username;
  pCoin.innerText = "Coins: "+userData.coin;
};

// ADMIN COIN
window.addCoin = async ()=>{
  if(userData.role !== "owner"){
    alert("Admin only");
    return;
  }

  let uid = prompt("User UID?");
  let amount = parseInt(prompt("Coin amount?"));

  const ref = doc(db,"users",uid);
  const snap = await getDoc(ref);

  let data = snap.data();
  data.coin += amount;

  await setDoc(ref,data);

  alert("Coin added 💰");
};

// ADD MANGA
window.addManga = async ()=>{
  if(userData.role !== "owner"){
    alert("Not admin");
    return;
  }

  let title = prompt("Title?");
  let price = prompt("Price?");

  await addDoc(collection(db,"manga"),{
    title,
    price: parseInt(price)
  });

  loadManga();
};

</script>

</body>
</html>
