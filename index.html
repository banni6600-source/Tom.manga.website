<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TOM MANGA | INFINITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff2d55; --s: #0070f3; --dark: #020203; --glass: rgba(15, 15, 20, 0.9); }
        body { background: var(--dark); color: #fff; font-family: 'Plus+Jakarta+Sans', sans-serif; overflow-x: hidden; }

        /* Multi-Layered Background */
        .bg-layer { position: fixed; inset: 0; z-index: -1; }
        .bg-layer::before { content: ""; position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 10% 10%, rgba(255,45,85,0.05), transparent 40%), radial-gradient(circle at 90% 90%, rgba(0,112,243,0.05), transparent 40%); }

        /* Typography & Components */
        .text-gradient { background: linear-gradient(to right, #ff2d55, #0070f3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: var(--glass); backdrop-filter: blur(50px); border: 1px solid rgba(255,255,255,0.04); border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .neo-input { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 18px; color: #fff; width: 100%; outline: none; transition: 0.4s; font-size: 14px; }
        .neo-input:focus { border-color: var(--p); background: rgba(255,255,255,0.05); }

        /* Buttons */
        .btn-prime { position: relative; background: linear-gradient(45deg, var(--p), #ff5e7d); padding: 16px 32px; border-radius: 20px; font-weight: 800; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; transition: 0.5s; overflow: hidden; }
        .btn-prime:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,45,85,0.4); }

        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-page { animation: slideUp 0.7s cubic-bezier(0.2, 1, 0.3, 1) forwards; }

        /* Reader Mode Customization */
        .reader-image { width: 100%; max-width: 1000px; margin: 0 auto; display: block; filter: contrast(1.05); }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<nav class="fixed top-0 w-full z-[1000] p-6 transition-all duration-500" id="navbar">
    <div class="max-w-7xl mx-auto glass-card px-8 py-5 flex justify-between items-center">
        <div class="flex items-center gap-4 cursor-pointer" onclick="router.navigate('home')">
            <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-blue-600 rounded-xl flex items-center justify-center font-black italic text-xl">T</div>
            <h1 class="text-2xl font-800 tracking-tighter text-gradient">TOM MANGA</h1>
        </div>
        <div class="flex items-center gap-6">
            <div id="statPanel" class="hidden md:flex gap-6 mr-6 border-r border-white/5 pr-6">
                <div class="text-right"><p class="text-[8px] text-zinc-500 font-bold uppercase">Balance</p><p id="navCoin" class="text-xs font-black text-yellow-500 italic">0</p></div>
            </div>
            <button onclick="router.navigate('profile')" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center border border-white/10 hover:border-red-500 transition-all"></button>
        </div>
    </div>
</nav>

<div id="root" class="mt-32 px-6 max-w-7xl mx-auto pb-40 min-h-screen"></div>

<div id="toastContainer" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[10000] flex flex-col gap-3"></div>

<div id="adminPanel" class="fixed inset-0 bg-[#010102] z-[5000] hidden overflow-y-auto">
    <div class="max-w-6xl mx-auto p-10">
        <div class="flex justify-between items-center mb-20">
            <div>
                <h2 class="text-5xl font-800 text-gradient tracking-tighter">ADMIN CORE</h2>
                <p class="text-zinc-500 text-[10px] font-black uppercase mt-2 tracking-[0.3em]">System Level: <span id="sysRole">---</span></p>
            </div>
            <button onclick="ui.toggleAdmin()" class="btn-prime bg-zinc-900">Close Terminal</button>
        </div>

        <div class="grid lg:grid-cols-3 gap-10">
            <div class="glass-card p-8 col-span-3 grid grid-cols-2 md:grid-cols-4 gap-6">
                <div class="p-4"><p class="text-zinc-500 text-[9px] font-bold uppercase">Total Users</p><p id="stUser" class="text-2xl font-black">--</p></div>
                <div class="p-4"><p class="text-zinc-500 text-[9px] font-bold uppercase">Total Manga</p><p id="stManga" class="text-2xl font-black">--</p></div>
                <div class="p-4"><p class="text-zinc-500 text-[9px] font-bold uppercase">Transactions</p><p id="stTx" class="text-2xl font-black">--</p></div>
                <div class="p-4"><p class="text-zinc-500 text-[9px] font-bold uppercase">Server Status</p><p class="text-2xl font-black text-green-500">LIVE</p></div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div class="glass-card p-10 space-y-6">
                    <h3 class="text-xs font-black text-red-500 uppercase">Series Creation</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input id="admMTitle" placeholder="Title" class="neo-input">
                        <input id="admMGenre" placeholder="Genre" class="neo-input">
                    </div>
                    <textarea id="admMDesc" placeholder="Full Description..." class="neo-input h-32"></textarea>
                    <div class="flex gap-4">
                        <input type="file" id="admMThumb" class="neo-input pt-3 text-xs">
                        <button onclick="admin.createManga()" id="btnMCreate" class="btn-prime px-12">Publish</button>
                    </div>
                </div>

                <div class="glass-card p-10 space-y-6">
                    <h3 class="text-xs font-black text-blue-500 uppercase">Chapter Deployment</h3>
                    <div class="grid grid-cols-3 gap-4">
                        <input id="admCId" placeholder="Manga ID" class="neo-input">
                        <input id="admCTitle" placeholder="Ep. Title" class="neo-input">
                        <input id="admCPrice" type="number" placeholder="Price" class="neo-input">
                    </div>
                    <input type="file" id="admCPages" multiple class="neo-input pt-3 text-xs">
                    <button onclick="admin.createChapter()" id="btnCCreate" class="btn-prime w-full">Deploy Episode</button>
                </div>
            </div>

            <div class="space-y-8">
                <div class="glass-card p-10 space-y-6 border-blue-500/10 border-2">
                    <h3 class="text-xs font-black text-purple-500 uppercase">User Authority</h3>
                    <input id="admSearchUid" placeholder="Search UID..." class="neo-input text-xs">
                    <button onclick="admin.findUser()" class="w-full btn-prime py-3 bg-zinc-800">Find User</button>
                    
                    <div id="admUserRes" class="hidden pt-6 border-t border-white/5 space-y-4">
                        <div class="flex justify-between"><span id="admUName" class="font-bold">Name</span><span id="admURole" class="text-xs text-zinc-500 italic">--</span></div>
                        <input id="admUCoin" type="number" placeholder="Set Coin" class="neo-input text-xs">
                        <button onclick="admin.updateUser()" class="btn-prime w-full py-3">Apply Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // [5. DATABASE ARCHITECTURE]
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, setDoc, getDoc, getDocs, serverTimestamp, updateDoc, increment, runTransaction, deleteDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDhb5iJxVxIdaXjMIGZP6nmI28DGQSR41k",
        authDomain: "tommangasite.firebaseapp.com",
        projectId: "tommangasite",
        storageBucket: "tommangasite.firebasestorage.app",
        messagingSenderId: "678188860278",
        appId: "1:678188860278:web:75ffe0d7ae003ed71df057"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const IMGBB_API = "မင်းရဲ့_IMGBB_KEY";

    let state = { user: null, mangas: [] };

    // [6. ROUTER ENGINE]
    const router = {
        navigate: (path, data = null) => {
            const root = document.getElementById("root");
            root.innerHTML = `<div class="flex items-center justify-center h-[60vh]"><div class="w-8 h-8 border-4 border-red-500 border-t-transparent rounded-full animate-spin"></div></div>`;
            
            setTimeout(() => {
                root.className = "animate-page mt-32 px-6 max-w-7xl mx-auto pb-40";
                switch(path) {
                    case 'home': view.home(root); break;
                    case 'profile': view.profile(root); break;
                    case 'detail': view.detail(root, data); break;
                    case 'reader': view.reader(root, data); break;
                    case 'login': view.login(root); break;
                }
            }, 300);
        }
    };

    // [7. UI VIEWS]
    const view = {
        home: (el) => {
            el.innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-16">
                    <div>
                        <h2 class="text-6xl font-800 tracking-tighter uppercase italic">Library</h2>
                        <p class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.4em] mt-2">Discover New Stories</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <button id="admToggle" onclick="ui.toggleAdmin()" class="hidden text-red-500 text-[10px] font-black border border-red-500/20 px-6 py-3 rounded-full hover:bg-red-500 hover:text-white transition-all uppercase">Admin Terminal</button>
                    </div>
                </div>
                <div id="mangaGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-10"></div>
            `;
            this.syncManga();
        },

        syncManga: () => {
            onSnapshot(query(collection(db, "manga"), orderBy("createdAt", "desc")), snap => {
                const grid = document.getElementById("mangaGrid");
                if(!grid) return;
                grid.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    grid.innerHTML += `
                        <div onclick="router.navigate('detail', '${d.id}')" class="group cursor-pointer">
                            <div class="relative aspect-[3/4] rounded-[40px] overflow-hidden border border-white/5 shadow-2xl transition-all duration-500 group-hover:-translate-y-4 group-hover:border-red-500/50">
                                <img src="${m.thumbnail}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-1000">
                                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent opacity-80"></div>
                                <div class="absolute bottom-6 left-6 right-6">
                                    <p class="text-[10px] font-800 uppercase tracking-tighter truncate">${m.title}</p>
                                    <div class="flex justify-between items-center mt-2">
                                        <span class="text-[7px] text-zinc-500 font-bold uppercase">${m.genre || 'Story'}</span>
                                        <span class="text-[7px] text-red-500 font-black">READ</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
        },

        detail: async (el, id) => {
            const m = (await getDoc(doc(db, "manga", id))).data();
            el.innerHTML = `
                <div class="flex flex-col md:flex-row gap-16 items-start">
                    <div class="w-full md:w-80 aspect-[3/4] rounded-[50px] overflow-hidden shadow-2xl shrink-0 border-4 border-white/5">
                        <img src="${m.thumbnail}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 space-y-8">
                        <button onclick="router.navigate('home')" class="text-zinc-600 hover:text-white text-[10px] font-black uppercase tracking-widest"> Back to Universe</button>
                        <h2 class="text-7xl font-800 italic tracking-tighter uppercase text-gradient">${m.title}</h2>
                        <p class="text-zinc-500 text-lg leading-relaxed italic max-w-2xl">${m.description || 'Entry description missing from database.'}</p>
                        <div class="flex gap-4">
                            <span class="glass-card px-6 py-3 text-[10px] font-black uppercase text-red-500">Manga ID: ${id}</span>
                            ${state.user?.role === 'owner' ? `<button onclick="admin.deleteManga('${id}')" class="text-red-600 text-[10px] font-black underline">Wipe Series</button>` : ''}
                        </div>
                    </div>
                </div>
                <div class="mt-32">
                    <div class="flex items-center gap-6 mb-12">
                        <h3 class="text-xs font-black uppercase tracking-[0.5em] text-zinc-700">Episode Archives</h3>
                        <div class="h-[1px] flex-1 bg-white/5"></div>
                    </div>
                    <div id="chapList" class="grid gap-4"></div>
                </div>
            `;
            this.syncChapters(id);
        },

        syncChapters: async (mid) => {
            const snap = await getDocs(query(collection(db, "manga", mid, "chapters"), orderBy("createdAt", "desc")));
            const list = document.getElementById("chapList");
            snap.forEach(d => {
                const c = d.data();
                const isPaid = state.user?.role === 'owner' || state.user?.role === 'admin' || state.user?.role === 'vip' || state.user?.unlockedChapters?.[d.id] || c.price === 0;
                list.innerHTML += `
                    <div onclick="logic.unlock('${mid}', '${d.id}', ${c.price})" class="glass-card p-8 flex justify-between items-center cursor-pointer hover:border-red-500/50 hover:bg-white/5 transition-all group">
                        <div class="flex items-center gap-6">
                            <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center font-black text-xs text-zinc-500 group-hover:text-red-500">EP</div>
                            <span class="text-xs font-black uppercase tracking-widest text-zinc-300">${c.title}</span>
                        </div>
                        <div class="flex items-center gap-6">
                            <span class="text-[9px] font-black ${isPaid ? 'text-green-500' : 'text-yellow-500'} uppercase">${isPaid ? 'Access Granted' : ' ' + c.price}</span>
                            <div class="w-10 h-10 rounded-full border border-white/5 flex items-center justify-center group-hover:bg-red-500 transition-all"></div>
                        </div>
                    </div>
                `;
            });
        },

        reader: async (el, ids) => {
            const [mid, cid] = ids.split(':');
            const c = (await getDoc(doc(db, "manga", mid, "chapters", cid))).data();
            el.innerHTML = `
                <div class="fixed top-0 left-0 w-full glass-card rounded-none border-t-0 p-6 z-[2000] flex justify-between items-center">
                    <button onclick="router.navigate('detail', '${mid}')" class="btn-prime px-8 text-[10px]">Return</button>
                    <p class="text-xs font-black uppercase text-red-500 tracking-widest">${c.title}</p>
                    <div class="w-20"></div>
                </div>
                <div class="flex flex-col items-center pt-10">
                    ${c.pages.map(p => `<img src="${p}" class="reader-image mb-4 shadow-2xl" loading="lazy">`).join('')}
                </div>
            `;
        },

        profile: (el) => {
            el.innerHTML = `
                <div class="max-w-xl mx-auto glass-card p-12 space-y-10 relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 text-[150px] font-black text-white/5 italic">USER</div>
                    <div class="text-center space-y-4">
                        <div class="w-24 h-24 bg-gradient-to-br from-red-600 to-blue-600 rounded-[35px] mx-auto shadow-2xl flex items-center justify-center text-3xl font-black italic">T</div>
                        <h2 class="text-4xl font-800 uppercase italic tracking-tighter">${state.user.username}</h2>
                        <span class="px-4 py-1 bg-white/5 border border-white/10 rounded-full text-[9px] font-black uppercase text-red-500">${state.user.role}</span>
                    </div>
                    <div class="bg-black/40 p-6 rounded-3xl space-y-4">
                        <div class="flex justify-between items-center"><span class="text-[10px] text-zinc-500 font-bold uppercase">Public UID</span><span onclick="logic.copy(this.innerText)" class="text-[9px] font-mono text-zinc-400 cursor-pointer hover:text-white">${auth.currentUser.uid}</span></div>
                        <div class="flex justify-between items-center"><span class="text-[10px] text-zinc-500 font-bold uppercase">Balance</span><span class="text-yellow-500 font-black italic"> ${state.user.coin}</span></div>
                    </div>
                    <div class="space-y-4">
                        <p class="text-[10px] text-zinc-500 font-black uppercase">Inter-Account Transfer</p>
                        <input id="xTarget" placeholder="Receiver ID" class="neo-input text-xs">
                        <input id="xAmount" type="number" placeholder="Coin Amount" class="neo-input text-xs">
                        <button onclick="logic.transfer()" class="btn-prime w-full">Initiate Transfer</button>
                    </div>
                    <button onclick="auth.signOut().then(()=>location.reload())" class="w-full text-zinc-700 text-[10px] font-black uppercase tracking-[0.3em] hover:text-red-500 transition-all">Destroy Session</button>
                </div>
            `;
        },

        login: (el) => {
            el.innerHTML = `
                <div class="max-w-sm mx-auto glass-card p-12 space-y-10 animate-page">
                    <div class="text-center">
                        <h2 id="authTitle" class="text-5xl font-800 italic uppercase tracking-tighter text-gradient">Login</h2>
                        <p class="text-[10px] font-black text-zinc-600 uppercase tracking-widest mt-2">Access Secure Database</p>
                    </div>
                    <div class="space-y-4">
                        <input id="uName" placeholder="Identiy (User)" class="neo-input text-center">
                        <input id="uPass" type="password" placeholder="Pass-key" class="neo-input text-center">
                    </div>
                    <button onclick="logic.auth()" class="btn-prime w-full py-5">Connect</button>
                    <p id="authSwitch" onclick="logic.toggleAuth()" class="text-center text-[10px] font-black text-zinc-600 uppercase cursor-pointer hover:text-white">Create Account</p>
                </div>
            `;
        }
    };

    // [8. SYSTEM LOGIC]
    let isReg = false;
    const logic = {
        auth: async () => {
            const u = document.getElementById("uName").value.trim().toLowerCase();
            const p = document.getElementById("uPass").value;
            if(!u || !p) return ui.toast("Credentials required", "");
            try {
                if(isReg) {
                    const r = await createUserWithEmailAndPassword(auth, `${u}@tom.com`, p);
                    await setDoc(doc(db, "users", r.user.uid), { username: u, coin: 50, role: 'member', unlockedChapters: {}, createdAt: serverTimestamp() });
                    ui.toast("Account Created! +50 Coin", "");
                } else {
                    await signInWithEmailAndPassword(auth, `${u}@tom.com`, p);
                    ui.toast("Access Granted", "");
                }
            } catch (e) { ui.toast("Access Denied", ""); }
        },
        toggleAuth: () => {
            isReg = !isReg;
            document.getElementById("authTitle").innerText = isReg ? "Register" : "Login";
            document.getElementById("authSwitch").innerText = isReg ? "Existing User? Login" : "Create Account";
        },
        unlock: async (mid, cid, price) => {
            if(price === 0 || state.user?.role === 'owner' || state.user?.role === 'admin' || state.user?.role === 'vip' || state.user?.unlockedChapters?.[cid]) return router.navigate('reader', `${mid}:${cid}`);
            if(state.user.coin < price) return ui.toast("Insufficent Balance", "");
            if(confirm(`Exchange ${price} coins for access?`)) {
                await runTransaction(db, async (t) => {
                    const uRef = doc(db, "users", auth.currentUser.uid);
                    const fresh = (await t.get(uRef)).data();
                    const unlocked = fresh.unlockedChapters || {};
                    unlocked[cid] = true;
                    t.update(uRef, { coin: increment(-price), unlockedChapters: unlocked });
                });
                ui.toast("Archive Unlocked", "");
                router.navigate('reader', `${mid}:${cid}`);
            }
        },
        transfer: async () => {
            const target = document.getElementById("xTarget").value.trim();
            const amt = parseInt(document.getElementById("xAmount").value);
            if(!target || isNaN(amt) || amt <= 0) return ui.toast("Invalid Parameters", "");
            try {
                await runTransaction(db, async (t) => {
                    const meRef = doc(db, "users", auth.currentUser.uid);
                    const toRef = doc(db, "users", target);
                    const meDoc = await t.get(meRef);
                    const toDoc = await t.get(toRef);
                    if(!toDoc.exists()) throw "User Not Found";
                    if(meDoc.data().coin < amt) throw "Insufficient Balance";
                    t.update(meRef, { coin: increment(-amt) });
                    t.update(toRef, { coin: increment(amt) });
                });
                ui.toast("Transfer Success", "");
                router.navigate('profile');
            } catch (e) { ui.toast(e, ""); }
        },
        copy: (t) => { navigator.clipboard.writeText(t); ui.toast("ID Copied", ""); }
    };

    // [9. MASTER ADMIN LOGIC]
    const admin = {
        img: async (f) => {
            const fd = new FormData(); fd.append("image", f);
            const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API}`, { method: "POST", body: fd });
            const d = await r.json(); return d.data.url;
        },
        createManga: async () => {
            const t = document.getElementById("admMTitle").value;
            const f = document.getElementById("admMThumb").files[0];
            if(!t || !f) return ui.toast("Missing Data", "");
            document.getElementById("btnMCreate").innerText = "Processing...";
            const url = await admin.img(f);
            await addDoc(collection(db, "manga"), { 
                title: t, thumbnail: url, description: document.getElementById("admMDesc").value, 
                genre: document.getElementById("admMGenre").value, createdAt: serverTimestamp() 
            });
            ui.toast("Entry Published", "");
            location.reload();
        },
        createChapter: async () => {
            const mid = document.getElementById("admCId").value.trim();
            const files = document.getElementById("admCPages").files;
            if(!mid || files.length === 0) return ui.toast("Entry ID & Pages required", "");
            document.getElementById("btnCCreate").innerText = "Cloud Syncing...";
            const urls = [];
            for(let f of files) urls.push(await admin.img(f));
            await addDoc(collection(db, "manga", mid, "chapters"), { 
                title: document.getElementById("admCTitle").value, 
                price: parseInt(document.getElementById("admCPrice").value) || 0, 
                pages: urls, createdAt: serverTimestamp() 
            });
            ui.toast("Episode Deployed", "");
            document.getElementById("btnCCreate").innerText = "Deploy Episode";
        },
        findUser: async () => {
            const d = await getDoc(doc(db, "users", document.getElementById("admSearchUid").value.trim()));
            if(d.exists()) {
                const u = d.data();
                document.getElementById("admUName").innerText = u.username;
                document.getElementById("admURole").innerText = u.role.toUpperCase();
                document.getElementById("admUCoin").value = u.coin;
                document.getElementById("admUserRes").classList.remove("hidden");
            }
        },
        updateUser: async () => {
            const uid = document.getElementById("admSearchUid").value.trim();
            await updateDoc(doc(db, "users", uid), { coin: parseInt(document.getElementById("admUCoin").value) });
            ui.toast("User Updated", "");
        },
        deleteManga: async (id) => {
            if(confirm("Confirm Destruction?")) {
                await deleteDoc(doc(db, "manga", id));
                ui.toast("Erased", "");
                router.navigate('home');
            }
        }
    };

    // [10. UI UTILS]
    const ui = {
        toast: (m, i) => {
            const c = document.getElementById("toastContainer");
            const t = document.createElement("div");
            t.className = "glass-card px-8 py-4 border-l-4 border-red-500 flex items-center gap-4 animate-page pointer-events-auto";
            t.innerHTML = `<span>${i}</span><p class="text-[10px] font-black uppercase tracking-widest">${m}</p>`;
            c.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        },
        toggleAdmin: () => document.getElementById("adminPanel").classList.toggle("hidden")
    };

    // [11. GLOBAL MONITOR]
    onAuthStateChanged(auth, u => {
        if(u) {
            onSnapshot(doc(db, "users", u.uid), d => {
                state.user = d.data();
                document.getElementById("navCoin").innerText = state.user.coin;
                document.getElementById("statPanel").classList.remove("hidden");
                if(state.user.role === 'owner' || state.user.role === 'admin') {
                    document.getElementById("admToggle")?.classList.remove("hidden");
                    document.getElementById("sysRole").innerText = state.user.role.toUpperCase();
                }
                router.navigate('home');
                
                // Analytics
                getDocs(collection(db, "users")).then(s => document.getElementById("stUser").innerText = s.size);
                getDocs(collection(db, "manga")).then(s => document.getElementById("stManga").innerText = s.size);
            });
        } else {
            router.navigate('login');
        }
    });

    window.router = router; window.logic = logic; window.ui = ui; window.admin = admin;

</script>
</body>
</html>
