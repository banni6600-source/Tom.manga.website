<!DOCTYPE html>
<html>
<head>
  <title>Manga App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    header {
      background: #111;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card p {
      padding: 8px;
      margin: 0;
      text-align: center;
    }

    .reader {
      display: none;
      text-align: center;
    }

    .reader img {
      width: 100%;
      margin-bottom: 10px;
    }

    .nav {
      position: sticky;
      top: 0;
      background: #000;
      padding: 10px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      background: red;
      border: none;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>📖 Sunday Style Manga</header>

<!-- HOME -->
<div id="home">

  <div class="grid">

    <div class="card" onclick="openManga(1)">
      <img src="cover1.jpg">
      <p>Manga 1</p>
    </div>

    <div class="card" onclick="openManga(2)">
      <img src="cover2.jpg">
      <p>Manga 2</p>
    </div>

  </div>

</div>

<!-- READER -->
<div id="reader" class="reader">

  <div class="nav">
    <button onclick="goHome()">🏠 Home</button>
  </div>

  <div id="images"></div>

</div>

<script>
function openManga(id){
  document.getElementById("home").style.display = "none";
  document.getElementById("reader").style.display = "block";

  let data = {
    1: ["1.jpg","2.jpg"],
    2: ["3.jpg","4.jpg"]
  };

  let container = document.getElementById("images");
  container.innerHTML = "";

  data[id].forEach(src=>{
    let img = document.createElement("img");
    img.src = src;
    container.appendChild(img);
  });
}

function goHome(){
  document.getElementById("home").style.display = "block";
  document.getElementById("reader").style.display = "none";
}
</script>

</body>
</html>
