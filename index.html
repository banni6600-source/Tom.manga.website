<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TOM MANGA | Ultimate Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff2d55; }
        body { background: #08080c; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(8, 8, 12, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .manga-card { background: rgba(255,255,255,0.02); border-radius: 24px; transition: 0.4s; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .manga-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(255, 45, 85, 0.2); }
        .reader-img { width: 100%; max-width: 850px; margin: 0 auto; display: block; opacity: 0; transition: opacity 0.8s; }
        .btn-premium { background: linear-gradient(135deg, #ff2d55 0%, #b3002d 100%); transition: 0.3s; }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce-slow { animation: bounce-slow 3s infinite; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

<div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-[10000] transition-all duration-500 opacity-0 -translate-y-10 pointer-events-none">
    <div id="toastBg" class="bg-zinc-900 border border-white/10 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
        <span id="toastIcon"></span>
        <p id="toastMsg" class="text-[10px] font-black uppercase tracking-widest"></p>
    </div>
</div>

<nav class="glass fixed top-0 w-full h-20 flex items-center justify-between px-8 z-[100]">
    <div class="flex items-center gap-2">
        <div class="w-2 h-8 bg-red-600 rounded-full shadow-[0_0_15px_#ff2d55]"></div>
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">TOM MANGA</h1>
    </div>
    <div class="flex items-center gap-6">
        <div id="userStats" onclick="showProfile()" class="text-right cursor-pointer hidden sm:block">
            <p id="userDisplay" class="text-[10px] font-black opacity-50 uppercase tracking-widest">GUEST</p>
            <p id="userCoin" class="text-sm font-black text-yellow-500 italic">💰 0</p>
        </div>
        <button id="authBtn" onclick="showAuth()" class="px-5 py-2 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-600 transition-all">Login</button>
    </div>
</nav>

<main class="mt-32 px-6 max-w-7xl mx-auto space-y-12">
    <div class="relative max-w-2xl mx-auto">
        <input type="text" id="searchInput" oninput="searchManga()" placeholder="Search manga..." 
            class="w-full bg-white/5 border border-white/10 p-5 pl-14 rounded-2xl outline-none focus:border-red-600 transition-all font-bold text-sm text-white">
        <span class="absolute left-6 top-1/2 -translate-y-1/2 opacity-30 text-xl">🔍</span>
    </div>

    <section id="ongoingSection" class="hidden">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-1.5 h-6 bg-green-500 rounded-full"></div>
            <h2 class="text-xl font-black italic tracking-tighter uppercase">Latest Updates</h2>
        </div>
        <div id="ongoingGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </section>

    <section>
        <div class="flex items-center gap-3 mb-6">
            <div class="w-1.5 h-6 bg-red-600 rounded-full"></div>
            <h2 class="text-xl font-black italic tracking-tighter uppercase">All Manga</h2>
        </div>
        <div id="mangaGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </section>
</main>

<div id="continueReading" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[1000] w-[90%] max-w-md">
    <div onclick="resumeReading()" class="bg-gradient-to-r from-red-600 to-red-800 p-4 rounded-2xl shadow-2xl cursor-pointer flex items-center justify-between border border-white/20 animate-bounce-slow">
        <div class="flex items-center gap-3">
            <span>📖</span>
            <div class="text-left">
                <p class="text-[8px] font-black opacity-70 uppercase">Continue Reading</p>
                <p id="lastReadInfo" class="text-xs font-bold truncate w-48 italic">...</p>
            </div>
        </div>
        <span>➜</span>
    </div>
</div>

<div id="mangaDetail" class="fixed inset-0 bg-[#08080c] z-[500] hidden overflow-y-auto">
    <div class="sticky top-0 glass p-6 z-10 flex justify-between">
        <button onclick="closeDetail()" class="text-red-500 font-black text-[10px] uppercase tracking-widest">← Back</button>
        <span id="detailTitle" class="font-black text-xs uppercase opacity-40"></span>
        <div class="w-10"></div>
    </div>
    <div id="detailContent" class="max-w-4xl mx-auto p-8 pt-12"></div>
</div>

<div id="readerView" class="fixed inset-0 bg-black z-[1100] hidden overflow-y-auto">
    <div class="fixed top-0 w-full p-4 glass flex justify-between items-center z-[1101]">
        <button onclick="closeReader()" class="text-[10px] font-black text-red-500 uppercase">Close</button>
        <span id="readerTitle" class="text-[10px] font-bold opacity-50 uppercase"></span>
        <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
    </div>
    <div id="readerImages" class="pt-24"></div>
</div>

<div id="profileModal" class="fixed inset-0 bg-[#08080c]/95 backdrop-blur-xl z-[2000] hidden flex items-center justify-center p-6 text-center">
    <div class="w-full max-w-sm bg-white/5 border border-white/10 rounded-[40px] p-10 relative">
        <button onclick="closeProfile()" class="absolute top-6 right-8 text-zinc-500">✕</button>
        <div class="w-16 h-16 bg-red-600 rounded-full mx-auto mb-4 flex items-center justify-center text-2xl">👤</div>
        <h3 id="profName" class="text-2xl font-black italic uppercase mb-1">...</h3>
        <p id="profRole" class="text-[8px] font-black text-red-500 uppercase tracking-widest mb-6 italic">Standard Member</p>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-left">
                <p class="text-[8px] font-bold opacity-40 uppercase tracking-widest">Balance</p>
                <p id="profCoin" class="text-lg font-black text-yellow-500 italic">💰 0</p>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-left">
                <p class="text-[8px] font-bold opacity-40 uppercase tracking-widest">Rank</p>
                <p class="text-[10px] font-black text-green-500 uppercase mt-1">Reader</p>
            </div>
        </div>
        <button onclick="auth.signOut().then(()=>location.reload())" class="w-full py-4 rounded-2xl border border-red-600/30 text-red-500 text-[10px] font-black uppercase">Sign Out</button>
    </div>
</div>

<div id="adminPanel" class="hidden fixed bottom-6 right-6 w-80 bg-zinc-900 border border-red-600/30 p-6 rounded-[32px] z-[400] shadow-2xl overflow-y-auto max-h-[70vh]">
    <h2 class="font-black text-red-500 mb-4 italic text-[10px] tracking-widest uppercase italic">Admin Dashboard</h2>
    <div class="space-y-3 text-[10px] font-bold">
        <input id="mTitle" placeholder="Manga Title" class="w-full bg-black/50 p-3 rounded-xl border border-white/10 text-white outline-none">
        <input id="mThumb" placeholder="Thumbnail URL" class="w-full bg-black/50 p-3 rounded-xl border border-white/10 text-white outline-none">
        <textarea id="mDesc" placeholder="Story Summary" class="w-full bg-black/50 p-3 rounded-xl border border-white/10 text-white outline-none h-20"></textarea>
        <button onclick="adminAddManga()" class="w-full btn-premium py-3 rounded-xl font-black uppercase">Publish Manga</button>
        <div class="pt-4 mt-4 border-t border-white/5 space-y-2">
            <p class="text-yellow-500 uppercase italic">User Controls</p>
            <input id="targetUser" placeholder="Target Username" class="w-full bg-black/50 p-3 rounded-xl border border-white/10 text-white">
            <input id="addAmount" type="number" placeholder="Coin Amount" class="w-full bg-black/50 p-3 rounded-xl border border-white/10 text-white">
            <button onclick="adminAction('coin')" class="w-full bg-blue-600 py-2 rounded-lg font-black uppercase">Add Coins</button>
            <button onclick="adminAction('premium')" class="w-full bg-yellow-600 py-2 rounded-lg font-black uppercase">Give Premium</button>
        </div>
    </div>
</div>

<div id="authModal" class="fixed inset-0 bg-[#08080c]/98 backdrop-blur-2xl z-[9999] flex items-center justify-center hidden p-6 text-center">
    <div class="w-full max-w-sm">
        <h2 id="authTitle" class="text-4xl font-black mb-8 uppercase italic tracking-tighter">Login</h2>
        <input id="uName" placeholder="Username" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 text-white outline-none mb-4 text-center font-bold">
        <input id="password" type="password" placeholder="Password" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 text-white outline-none mb-6 text-center font-bold">
        <button onclick="handleAuth()" class="w-full btn-premium py-5 rounded-2xl font-black uppercase tracking-widest mb-4">Confirm</button>
        <p onclick="toggleAuthMode()" id="toggleText" class="text-zinc-500 text-xs cursor-pointer font-bold hover:text-white uppercase tracking-widest">Register New Account</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, setDoc, getDoc, getDocs, serverTimestamp, runTransaction, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ✅ မင်းရဲ့ Firebase Config ကို အစားထိုးပြီးသားဖြစ်သည်
    const firebaseConfig = {
        apiKey: "AIzaSyDhb5iJxVxIdaXjMIGZP6nmI28DGQSR41k",
        authDomain: "tommangasite.firebaseapp.com",
        projectId: "tommangasite",
        storageBucket: "tommangasite.firebasestorage.app",
        messagingSenderId: "678188860278",
        appId: "1:678188860278:web:75ffe0d7ae003ed71df057",
        measurementId: "G-LT7B23BSMY"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userData = null;
    let isReg = false;

    // --- LOGIC ---
    window.notify = (msg, icon="✅") => {
        const t = document.getElementById("toast");
        document.getElementById("toastMsg").innerText = msg;
        document.getElementById("toastIcon").innerText = icon;
        t.classList.remove("opacity-0", "-translate-y-10");
        setTimeout(() => t.classList.add("opacity-0", "-translate-y-10"), 3000);
    };

    window.searchManga = () => {
        const q = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll(".manga-card").forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
        });
    };

    window.showAuth = () => document.getElementById("authModal").classList.toggle("hidden");
    window.toggleAuthMode = () => { isReg = !isReg; document.getElementById("authTitle").innerText = isReg ? "REGISTER" : "LOGIN"; };
    window.showProfile = () => { if(userData) document.getElementById("profileModal").classList.remove("hidden"); };
    window.closeProfile = () => document.getElementById("profileModal").classList.add("hidden");

    window.handleAuth = async () => {
        const u = document.getElementById("uName").value.trim().toLowerCase();
        const p = document.getElementById("password").value;
        const email = `${u}@tommanga.com`;
        try {
            if(isReg) {
                const r = await createUserWithEmailAndPassword(auth, email, p);
                await setDoc(doc(db, "users", r.user.uid), { username: u, coin: 0, role: "member", unlockedChapters: {} });
                await setDoc(doc(db, "users_by_name", u), { uid: r.user.uid });
                location.reload();
            } else { await signInWithEmailAndPassword(auth, email, p); showAuth(); }
        } catch(e) { notify(e.message, "⚠️"); }
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            onSnapshot(doc(db, "users", user.uid), d => {
                userData = d.data();
                document.getElementById("userDisplay").innerText = userData.username;
                document.getElementById("userCoin").innerText = "💰 " + userData.coin;
                document.getElementById("profName").innerText = userData.username;
                document.getElementById("profCoin").innerText = "💰 " + userData.coin;
                if(userData.role === 'admin') document.getElementById("adminPanel").classList.remove("hidden");
                if(userData.lastRead) {
                    document.getElementById("continueReading").classList.remove("hidden");
                    document.getElementById("lastReadInfo").innerText = `${userData.lastRead.mTitle} - ${userData.lastRead.cTitle}`;
                }
            });
            document.getElementById("authBtn").innerText = "LOGOUT";
            document.getElementById("authBtn").onclick = () => auth.signOut().then(()=>location.reload());
        }
    });

    onSnapshot(query(collection(db, "manga"), orderBy("createdAt", "desc")), snap => {
        const allGrid = document.getElementById("mangaGrid");
        const onGrid = document.getElementById("ongoingGrid");
        allGrid.innerHTML = ""; onGrid.innerHTML = "";
        snap.forEach(docSnap => {
            const m = docSnap.data();
            const id = docSnap.id;
            const card = `<div class="manga-card group cursor-pointer" onclick="viewDetail('${id}')">
                <div class="relative aspect-[3/4] overflow-hidden">
                    <img src="${m.thumbnail}" class="w-full h-full object-cover transition-transform group-hover:scale-110">
                    ${m.status === 'ongoing' ? '<span class="absolute top-2 left-2 bg-green-500 text-[7px] font-black px-2 py-0.5 rounded-sm uppercase tracking-tighter shadow-lg">New Episode</span>' : ''}
                </div>
                <div class="p-4"><h4 class="font-black text-[9px] uppercase truncate tracking-widest">${m.title}</h4></div>
            </div>`;
            allGrid.innerHTML += card;
            if(m.status === 'ongoing') {
                onGrid.innerHTML += card;
                document.getElementById("ongoingSection").classList.remove("hidden");
            }
        });
    });

    window.viewDetail = async id => {
        const m = (await getDoc(doc(db, "manga", id))).data();
        document.getElementById("mangaDetail").classList.remove("hidden");
        document.getElementById("detailTitle").innerText = m.title;
        const content = document.getElementById("detailContent");
        content.innerHTML = `<div class="flex flex-col md:flex-row gap-10 mb-12 animate-fade-in">
            <img src="${m.thumbnail}" class="w-56 rounded-[40px] shadow-2xl border border-white/5">
            <div class="flex-1 text-center md:text-left">
                <h2 class="text-5xl font-black mb-4 uppercase italic tracking-tighter">${m.title}</h2>
                <p class="text-zinc-500 text-xs mb-8 leading-relaxed italic opacity-80">${m.description || 'No summary provided.'}</p>
                ${userData?.role === 'admin' ? `<button onclick="addChapUI('${id}')" class="bg-red-600 px-6 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-red-600/20">Add Chapter +</button>` : ''}
            </div>
        </div><div id="chapList" class="grid gap-4 pt-10 border-t border-white/5"></div>`;

        const chaps = await getDocs(query(collection(db, "manga", id, "chapters"), orderBy("createdAt", "asc")));
        chaps.forEach(cDoc => {
            const c = cDoc.data();
            const pDate = userData?.unlockedChapters?.[cDoc.id]?.toDate();
            const isExp = pDate && (new Date() - pDate > 90*24*60*60*1000);
            document.getElementById("chapList").innerHTML += `
                <div onclick="unlockChapter('${id}','${cDoc.id}',${c.price})" class="bg-white/5 p-6 rounded-[28px] border border-white/5 flex justify-between items-center hover:border-red-600 cursor-pointer group transition-all">
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-sm uppercase group-hover:translate-x-1 transition-transform tracking-wider">${c.title}</span>
                        ${pDate ? (isExp ? '<span class="text-[7px] text-red-500 font-black italic">[EXPIRED]</span>' : '<span class="text-[7px] text-green-500 font-black italic">[RENTED]</span>') : ''}
                    </div>
                    <span class="font-black text-xs ${c.price > 0 ? 'text-yellow-500' : 'text-green-500'}">${c.price > 0 ? '💰 ' + c.price : 'FREE'}</span>
                </div>`;
        });
    };

    window.unlockChapter = async (mId, cId, price) => {
        if(price === 0) return openReader(mId, cId);
        if(!userData) return showAuth();
        const now = new Date();
        const isPrem = userData.isPremium && userData.expiryDate.toDate() > now;
        const pDate = userData.unlockedChapters?.[cId]?.toDate();
        const isExp = pDate && (now - pDate > 90*24*60*60*1000);

        if(isPrem || (pDate && !isExp)) return openReader(mId, cId);
        if(userData.coin < price) return notify("Not enough coins", "⚠️");
        
        if(confirm(`Rent for 3 months using ${price} coins?`)) {
            await runTransaction(db, async t => {
                const uRef = doc(db, "users", auth.currentUser.uid);
                const unlocked = (await t.get(uRef)).data().unlockedChapters || {};
                unlocked[cId] = serverTimestamp();
                t.update(uRef, { coin: userData.coin - price, unlockedChapters: unlocked });
            });
            notify("Rental Successful");
            openReader(mId, cId);
        }
    };

    window.openReader = async (mId, cId) => {
        const c = (await getDoc(doc(db, "manga", mId, "chapters", cId))).data();
        document.getElementById("readerTitle").innerText = c.title;
        document.getElementById("readerImages").innerHTML = c.pages.map(u => `<img src="${u}" class="reader-img" onload="this.style.opacity=1" loading="lazy">`).join('');
        document.getElementById("readerView").style.display = "block";
        if(auth.currentUser) updateDoc(doc(db, "users", auth.currentUser.uid), {
            lastRead: { mId, cId, mTitle: document.getElementById("detailTitle").innerText, cTitle: c.title }
        });
    };

    window.resumeReading = () => { if(userData.lastRead) openReader(userData.lastRead.mId, userData.lastRead.cId); };
    window.closeDetail = () => document.getElementById("mangaDetail").classList.add("hidden");
    window.closeReader = () => document.getElementById("readerView").style.display = "none";

    // --- ADMIN ACTIONS ---
    window.adminAddManga = async () => {
        const title = document.getElementById("mTitle").value;
        const thumbnail = document.getElementById("mThumb").value;
        const description = document.getElementById("mDesc").value;
        const status = confirm("Set as Ongoing Episode?") ? 'ongoing' : 'completed';
        if(!title || !thumbnail) return notify("Incomplete data", "⚠️");
        await addDoc(collection(db, "manga"), { title, thumbnail, description, status, createdAt: serverTimestamp() });
        notify("Published!");
    };

    window.addChapUI = async id => {
        const t = prompt("Chapter Title (e.g. Episode 01)");
        const p = parseInt(prompt("Price (0 for Free)")) || 0;
        const u = prompt("Image URLs (Split by comma)");
        if(t && u) {
            await addDoc(collection(db, "manga", id, "chapters"), {
                title: t, price: p, pages: u.split(",").map(i => i.trim()), createdAt: serverTimestamp()
            });
            viewDetail(id);
        }
    };

    window.adminAction = async type => {
        const u = document.getElementById("targetUser").value.trim().toLowerCase();
        const nSnap = await getDoc(doc(db, "users_by_name", u));
        if(!nSnap.exists()) return notify("User not found", "⚠️");
        const uid = nSnap.data().uid;
        if(type === 'coin') {
            const amt = parseInt(document.getElementById("addAmount").value);
            await runTransaction(db, async t => {
                const uRef = doc(db, "users", uid);
                const cur = (await t.get(uRef)).data().coin || 0;
                t.update(uRef, { coin: cur + amt });
            });
            notify("Coin Recharge Success");
        } else {
            const exp = new Date(); exp.setMonth(exp.getMonth() + 1);
            await updateDoc(doc(db, "users", uid), { isPremium: true, expiryDate: exp });
            notify("Premium Activated");
        }
    };
</script>
</body>
</html>
