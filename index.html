<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaVerse - Your Digital Manga Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#1e293b',
                        background: '#0f172a',
                        card: '#1e293b',
                        foreground: '#f8fafc',
                        accent: '#94a3b8',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-foreground">
    <header class="bg-card shadow-sm sticky top-0 z-50 border-b border-white/5">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="text-2xl font-bold text-primary">MangaVerse</div>
                
                <div class="relative w-1/2 md:w-1/3">
                    <input type="text" id="searchInput" placeholder="Search manga..." 
                        class="w-full bg-background border border-slate-700 px-4 py-1.5 rounded-lg focus:outline-none focus:border-primary text-sm text-white">
                    <div id="suggestionBox" class="hidden absolute w-full mt-2 bg-card border border-slate-700 rounded-lg shadow-xl z-50">
                        <ul id="suggestionList"></ul>
                    </div>
                </div>

                <div class="hidden md:flex space-x-6">
                    <a href="#" class="text-foreground hover:text-primary transition">Home</a>
                    <a href="#" class="text-foreground hover:text-primary transition">Manga List</a>
                </div>
            </div>
        </nav>
    </header>

    <section class="bg-secondary py-16 border-b border-white/5">
        <div class="container mx-auto px-4">
            <h1 class="text-4xl md:text-5xl font-bold text-center mb-6 text-white">Discover Amazing Manga</h1>
            <p class="text-accent text-center max-w-2xl mx-auto">Your one-stop destination for reading and downloading your favorite manga series powered by Supabase.</p>
        </div>
    </section>

    <section class="py-12">
        <div class="container mx-auto px-4">
            <h2 id="sectionTitle" class="text-2xl font-bold mb-8">Latest Releases</h2>
            
            <div id="mangaGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <p class="text-accent col-span-full text-center">Fetching data from database...</p>
            </div>
        </div>
    </section>

    <footer class="bg-secondary mt-12 py-8 border-t border-white/5">
        <div class="container mx-auto px-4 text-center text-accent">
            <p>&copy; 2026 MangaVerse. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // --- Supabase Setup ---
        const supabaseUrl = 'https://wcjpbkmwkivasitudwcxn.supabase.co';
        const supabaseKey = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjanBia213a2l2YXNpdWR3Y3huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTA4NzUsImV4cCI6MjA5MjY4Njg3NX0.b7_4x_E7PwO46MYvjUdbUQUHrQBf9bTBw2IOzkPq0Tc';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const mangaGrid = document.getElementById('mangaGrid');
        const searchInput = document.getElementById('searchInput');
        const suggestionBox = document.getElementById('suggestionBox');
        const suggestionList = document.getElementById('suggestionList');

        // 1. Fetch all manga on load
        async function loadAllManga() {
            const { data, error } = await supabase.from('manga').select('*');
            
            if (error) {
                mangaGrid.innerHTML = `<p class="text-red-500 col-span-full text-center">Error: ${error.message}</p>`;
                return;
            }

            renderManga(data);
        }

        // 2. Render Manga Cards
        function renderManga(mangaList) {
            mangaGrid.innerHTML = '';
            if (!mangaList || mangaList.length === 0) {
                mangaGrid.innerHTML = '<p class="text-accent col-span-full text-center">No manga found in database.</p>';
                return;
            }

            mangaList.forEach(manga => {
                const card = `
                    <div class="bg-card rounded-lg shadow-sm overflow-hidden hover:shadow-lg transition border border-white/5 group">
                        <div class="overflow-hidden">
                            <img src="${manga.cover_url}" alt="${manga.title}" class="w-full h-64 object-cover group-hover:scale-105 transition duration-300">
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold mb-1 text-white truncate">${manga.title}</h3>
                            <p class="text-accent text-xs mb-4">${manga.genre}</p>
                            <div class="flex space-x-2">
                                <button class="bg-primary text-white px-4 py-1.5 rounded text-xs hover:bg-blue-600 transition">Read</button>
                                <button class="bg-slate-700 text-white px-3 py-1.5 rounded text-xs hover:bg-slate-600 transition">Info</button>
                            </div>
                        </div>
                    </div>
                `;
                mangaGrid.insertAdjacentHTML('beforeend', card);
            });
        }

        // 3. Live Search Logic
        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length > 0) {
                const { data } = await supabase.from('manga').select('*').ilike('title', `%${query}%`);
                
                suggestionList.innerHTML = '';
                if (data && data.length > 0) {
                    suggestionBox.classList.remove('hidden');
                    data.forEach(manga => {
                        const li = document.createElement('li');
                        li.className = "px-4 py-2 hover:bg-slate-700 cursor-pointer text-sm border-b border-slate-700 last:border-0 text-white";
                        li.textContent = manga.title;
                        li.onclick = () => {
                            renderManga([manga]);
                            suggestionBox.classList.add('hidden');
                            searchInput.value = manga.title;
                            document.getElementById('sectionTitle').innerText = "Search Result";
                        };
                        suggestionList.appendChild(li);
                    });
                }
            } else {
                suggestionBox.classList.add('hidden');
                loadAllManga();
                document.getElementById('sectionTitle').innerText = "Latest Releases";
            }
        });

        // Close suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target)) suggestionBox.classList.add('hidden');
        });

        // Initialize
        loadAllManga();
    </script>
</body>
</html>
