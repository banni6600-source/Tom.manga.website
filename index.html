<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TOM MANGA | Your Personal Universe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff2d55; --gold: #ffcc00; }
        body { 
            background: #08080c; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 45, 85, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(112, 0, 255, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* Luxury Glassmorphism */
        .premium-nav { background: rgba(8, 8, 12, 0.85); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.08); }
        .manga-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }
        .manga-card:hover { 
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(255, 45, 85, 0.2);
        }

        /* Neon Text Glow */
        .glow-text { text-shadow: 0 0 15px rgba(255, 45, 85, 0.5); }
        .gold-glow { text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }

        /* Custom Buttons */
        .btn-premium {
            background: linear-gradient(135deg, #ff2d55 0%, #b3002d 100%);
            box-shadow: 0 10px 20px rgba(255, 45, 85, 0.3);
            border: none; transition: 0.4s;
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255, 45, 85, 0.5); }

        /* Reader Overlay */
        #readerView { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; }
        .reader-scroll { scroll-behavior: smooth; }
        .reader-img { width: 100%; max-width: 800px; margin: 0 auto; display: block; }

        /* Admin UI */
        .admin-glass {
            background: rgba(255, 45, 85, 0.1); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 45, 85, 0.3);
        }
    </style>
</head>
<body class="pb-12">

<nav class="premium-nav fixed top-0 w-full h-20 flex items-center justify-between px-8 z-[100]">
    <div class="flex items-center gap-2">
        <div class="w-3 h-8 bg-red-600 rounded-full animate-pulse"></div>
        <h1 class="text-2xl font-black tracking-tighter italic glow-text">TOM MANGA</h1>
    </div>
    
    <div class="flex items-center gap-6">
        <div class="hidden md:flex flex-col text-right">
            <span id="userMail" class="text-[10px] opacity-40 uppercase tracking-widest font-bold">Connecting...</span>
            <span id="userCoin" class="text-sm font-black text-yellow-500 gold-glow">💰 0.00</span>
        </div>
        <button onclick="toggleMenu()" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all active:scale-90">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
    </div>
</nav>

<div id="userMenu" class="fixed top-24 right-8 w-80 bg-zinc-950/90 border border-white/10 backdrop-blur-3xl rounded-[32px] p-8 z-[101] hidden animate-up shadow-2xl">
    <div class="flex flex-col items-center text-center">
        <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-red-600 to-indigo-600 p-1 mb-4 shadow-lg shadow-red-600/20">
            <div class="w-full h-full rounded-full bg-zinc-950 flex items-center justify-center text-2xl font-black">Y</div>
        </div>
        <h3 id="displayMail" class="font-bold text-lg mb-1">Guest</h3>
        <p id="vipStatus" class="text-[10px] font-black text-yellow-500 tracking-[0.2em] mb-6">STANDARD MEMBER</p>
        
        <div class="w-full space-y-3">
            <button onclick="copyUID()" class="w-full py-4 bg-white/5 hover:bg-white/10 rounded-2xl text-[10px] font-bold uppercase tracking-widest transition">Copy User ID</button>
            <button id="authBtn" onclick="showAuth()" class="w-full btn-premium py-4 rounded-2xl font-bold text-sm">Access System</button>
        </div>
    </div>
</div>

<main class="mt-32 px-6 max-w-7xl mx-auto">
    <div class="relative w-full h-[400px] rounded-[40px] overflow-hidden mb-16 border border-white/5 group">
        <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=1200" class="w-full h-full object-cover transition duration-1000 group-hover:scale-105">
        <div class="absolute inset-0 bg-gradient-to-t from-[#08080c] via-[#08080c]/20 to-transparent"></div>
        <div class="absolute bottom-12 left-12 max-w-lg">
            <span class="bg-red-600 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-tighter mb-4 inline-block">Trending Now</span>
            <h2 class="text-5xl font-black mb-4 tracking-tighter leading-none">New World <br>Arising.</h2>
            <p class="text-zinc-400 text-sm mb-6 font-medium">Experience the masterclass of storytelling with ultra HD visuals.</p>
            <button class="px-8 py-3 bg-white text-black font-black rounded-full hover:scale-105 transition">Read Now</button>
        </div>
    </div>

    <div class="relative max-w-2xl mx-auto mb-20">
        <input type="text" id="searchInput" placeholder="Find your story..." class="w-full bg-white/5 border border-white/10 p-6 rounded-[28px] outline-none focus:ring-4 ring-red-600/20 focus:border-red-600 transition-all pl-16 text-lg font-medium">
        <div class="absolute left-6 top-6 opacity-40">🔍</div>
    </div>

    <div class="flex items-center justify-between mb-10">
        <h3 class="text-3xl font-black italic tracking-tighter">Collections</h3>
        <div class="h-[2px] flex-1 bg-gradient-to-r from-red-600 to-transparent ml-6"></div>
    </div>
    
    <div id="mangaGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
        </div>
</main>

<div id="adminPanel" class="hidden fixed bottom-10 right-10 w-96 admin-glass rounded-[40px] p-8 z-[500] shadow-2xl">
    <div class="flex items-center gap-3 mb-6">
        <span class="w-3 h-3 bg-green-500 rounded-full animate-ping"></span>
        <h2 class="font-black text-red-500 tracking-widest italic">OWNER MODE</h2>
    </div>
    <div class="space-y-4">
        <input id="mTitle" placeholder="Story Title" class="w-full bg-black/40 p-4 rounded-2xl border border-white/10 text-sm focus:border-red-600 outline-none">
        <input id="mThumb" placeholder="Cover Image URL" class="w-full bg-black/40 p-4 rounded-2xl border border-white/10 text-sm focus:border-red-600 outline-none">
        <textarea id="mDesc" placeholder="What's the story about?" class="w-full bg-black/40 p-4 rounded-2xl border border-white/10 text-sm h-24 focus:border-red-600 outline-none"></textarea>
        <button onclick="adminAddManga()" class="w-full btn-premium py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Publish Manga</button>
    </div>
</div>

<div id="readerView" class="reader-scroll">
    <div class="fixed top-0 w-full p-6 flex justify-between items-center bg-black/90 backdrop-blur-xl z-[10001] border-b border-white/10">
        <button onclick="closeReader()" class="font-black text-red-500 uppercase tracking-widest text-xs">Close Reader</button>
        <span id="readerTitle" class="text-[10px] font-bold opacity-40 uppercase tracking-widest"></span>
        <div class="w-10 h-10 bg-red-600/20 rounded-full flex items-center justify-center text-red-500">📖</div>
    </div>
    <div id="readerImages" class="pt-24 pb-20"></div>
</div>

<div id="authModal" class="fixed inset-0 bg-[#08080c]/98 backdrop-blur-xl z-[9999] flex items-center justify-center hidden">
    <div class="w-full max-w-sm p-10 text-center">
        <h2 class="text-4xl font-black mb-8 glow-text">ACCESS</h2>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="Email Address" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 outline-none focus:border-red-600">
            <input id="password" type="password" placeholder="Password" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 outline-none focus:border-red-600">
            <button onclick="handleAuth('login')" class="w-full btn-premium py-5 rounded-2xl font-black tracking-widest">LOGIN</button>
            <p onclick="showAuth()" class="text-zinc-600 text-sm cursor-pointer hover:text-white transition">Go Back</p>
        </div>
    </div>
</div>

<script type="module">
    // Firebase Setup (Slightly improved logic for speed)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = { apiKey: "AIzaSy...", authDomain: "tommangasite...", projectId: "tommangasite" };
    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_MAIL = "Yati2009@gmail.com";

    // Dynamic Auth State
    onAuthStateChanged(auth, (user) => {
        const menuBtn = document.getElementById("authBtn");
        if (user) {
            document.getElementById("userMail").innerText = user.email;
            document.getElementById("displayMail").innerText = user.email.split('@')[0];
            menuBtn.innerText = "SIGN OUT";
            menuBtn.onclick = () => signOut(auth);
            
            // Show Admin Panel only for Yati
            if(user.email === ADMIN_MAIL) {
                document.getElementById("adminPanel").classList.remove("hidden");
                document.getElementById("vipStatus").innerText = "SYSTEM OWNER";
                document.getElementById("vipStatus").classList.add("text-red-500");
            }

            onSnapshot(doc(db, "users", user.uid), (d) => {
                if(d.exists()) {
                    document.getElementById("userCoin").innerText = "💰 " + d.data().coin.toLocaleString();
                }
            });
        } else {
            document.getElementById("adminPanel").classList.add("hidden");
            menuBtn.innerText = "ACCESS SYSTEM";
            menuBtn.onclick = showAuth;
        }
    });

    // UX Helpers
    window.toggleMenu = () => document.getElementById("userMenu").classList.toggle("hidden");
    window.showAuth = () => document.getElementById("authModal").classList.toggle("hidden");
    window.closeReader = () => {
        document.getElementById("readerView").style.display = "none";
        document.body.style.overflow = "auto";
    };

    // (Add other logic for Search, Open Manga, etc. here as before)
</script>
</body>
</html>
