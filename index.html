<!DOCTYPE html>
<html>
<head>
  <title>Manga Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black;color:white;text-align:center;">

<h2>Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<div id="coinBox" style="display:none;">
  <h3>Coins: <span id="coin">0</span></h3>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCoGazgNsEEK70iMVWzUyWRSZJWZxAZ_g8",
  authDomain: "mang-9c8b4.firebaseapp.com",
  projectId: "mang-9c8b4",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// REGISTER
window.register = async function(){
  try{
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    const user = await createUserWithEmailAndPassword(auth, email, pass);

    await setDoc(doc(db, "users", user.user.uid), {
      coin: 100
    });

    alert("Account created!");
  }catch(e){
    alert(e.message);
  }
}

// LOGIN
window.login = async function(){
  try{
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    const user = await signInWithEmailAndPassword(auth, email, pass);

    const data = await getDoc(doc(db, "users", user.user.uid));

    document.getElementById("coin").innerText = data.data().coin;
    document.getElementById("coinBox").style.display = "block";

    alert("Login success!");
  }catch(e){
    alert(e.message);
  }
}
</script>

</body>
</html>
