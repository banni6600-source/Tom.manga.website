<!DOCTYPE html>  <html lang="my">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">  
    <title>TOM MANGA | Owner Edition</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">  
    <style>  
        :root { --accent: #ff2d55; }  
        body { background: #08080c; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }  
        .glass { background: rgba(8, 8, 12, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }  
        .manga-card { background: rgba(255,255,255,0.02); border-radius: 24px; transition: 0.4s; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }  
        .manga-card:hover { transform: translateY(-8px); border-color: var(--accent); }  
        .reader-img { width: 100%; max-width: 100%; margin: 0 auto; display: block; opacity: 0; transition: opacity 0.5s; image-rendering: -webkit-optimize-contrast; }  
        .btn-premium { background: linear-gradient(135deg, #ff2d55 0%, #b3002d 100%); }  
        .animate-fade { animation: fadeIn 0.3s ease-out; }  
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }  
    </style>  
</head>  
<body class="pb-20">  <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 z-[10000] transition-all duration-500 opacity-0 -translate-y-10 pointer-events-none text-center">  
    <div class="bg-zinc-900 border border-white/10 px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 text-xs font-black uppercase">  
        <span id="toastIcon"></span><p id="toastMsg"></p>  
    </div>  
</div>  <nav class="glass fixed top-0 w-full h-20 flex items-center justify-between px-8 z-[100]">  
    <div class="flex items-center gap-2">  
        <div class="w-2 h-8 bg-red-600 rounded-full"></div>  
        <h1 class="text-2xl font-black italic uppercase">TOM MANGA</h1>  
    </div>  
    <div class="flex items-center gap-4">  
        <div id="userStats" class="hidden sm:block text-right"><p id="userCoin" class="text-sm font-black text-yellow-500 italic">💰 0</p></div>  
        <button onclick="toggleMenu()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 border border-white/5 text-xl">⋮</button>  
        <div id="userDropdown" class="hidden absolute right-8 mt-[340px] w-64 bg-[#0f0f15] border border-white/10 rounded-2xl shadow-2xl z-[110] p-2 text-left animate-fade">  
            <div id="dropStatus" class="text-[8px] font-black p-3 text-center bg-white/5 rounded-xl mb-2">MEMBER</div>  
            <div id="adminPanel" class="hidden border border-red-500/20 rounded-xl mb-2 p-2 bg-red-500/5 space-y-2">  
                <div class="flex items-center justify-between bg-black/40 p-2 rounded-lg border border-white/5">  
                    <span class="text-[8px] font-black">FREE MODE</span>  
                    <button id="freeModeBtn" onclick="toggleFreeMode()" class="px-3 py-1 rounded text-[8px] font-black uppercase">OFF</button>  
                </div>  
                <button onclick="toggleMangaForm()" class="w-full bg-red-600 py-2 rounded text-[8px] font-black uppercase">Post Manga</button>  
            </div>  
            <button onclick="buyCoinAction()" class="w-full text-left p-3 text-[10px] font-black uppercase text-yellow-500 hover:bg-white/5 rounded-xl transition-all">💰 Buy Coins</button>  
            <button id="authBtn" onclick="showAuth()" class="w-full text-left p-3 text-[10px] font-black uppercase hover:bg-white/5 rounded-xl">🚪 Login</button>  
            <button id="logoutBtn" onclick="auth.signOut().then(()=>location.reload())" class="hidden w-full text-left p-3 text-[10px] font-black uppercase text-red-500 hover:bg-red-500/10 rounded-xl">🚪 Sign Out</button>  
        </div>  
    </div>  
</nav>  <main class="mt-32 px-6 max-w-7xl mx-auto">  
    <div id="mangaForm" class="hidden bg-white/5 p-6 rounded-3xl border border-white/10 mb-10 space-y-4 animate-fade">  
        <input id="mTitle" placeholder="Manga Title" class="bg-black/40 w-full p-4 rounded-xl outline-none text-sm border border-white/5">  
        <input id="mThumb" placeholder="Thumbnail URL" class="bg-black/40 w-full p-4 rounded-xl outline-none text-sm border border-white/5">  
        <textarea id="mDesc" placeholder="Summary..." class="bg-black/40 w-full p-4 rounded-xl outline-none text-sm h-24 border border-white/5"></textarea>  
        <button onclick="adminAddManga()" class="bg-red-600 px-8 py-3 rounded-xl text-xs font-black uppercase">Publish</button>  
    </div>  
    <div class="space-y-6">  
        <h2 class="text-xl font-black italic uppercase border-l-4 border-red-600 pl-4">Library</h2>  
        <div id="mGrid" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>  
    </div>  
</main>  <div id="mDetail" class="fixed inset-0 bg-[#08080c] z-[500] hidden overflow-y-auto">  
    <button onclick="closeDetail()" class="fixed top-6 left-6 z-[510] bg-white/10 w-12 h-12 flex items-center justify-center rounded-full backdrop-blur-xl border border-white/5">←</button>  
    <div id="detailContent" class="max-w-4xl mx-auto p-8 pt-24 animate-fade"></div>  
</div>  <div id="reader" class="fixed inset-0 bg-black z-[1100] hidden overflow-y-auto">  
    <div class="fixed top-0 w-full p-4 glass flex justify-between items-center z-[1101]">  
        <button onclick="closeReader()" class="text-[10px] font-black text-red-500 uppercase">Close</button>  
        <span id="rTitle" class="text-[10px] font-bold opacity-50 truncate max-w-[150px]"></span>  
        <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>  
    </div>  
    <div id="rImages" class="pt-20"></div>  
</div>  <div id="authModal" class="fixed inset-0 bg-[#08080c]/98 z-[9999] flex items-center justify-center hidden p-6 text-center">  
    <div class="w-full max-w-sm">  
        <h2 id="authTitle" class="text-4xl font-black mb-8 italic">LOGIN</h2>  
        <input id="uName" placeholder="Username" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 mb-4 outline-none font-bold text-center">  
        <input id="password" type="password" placeholder="Password" class="w-full bg-white/5 p-5 rounded-2xl border border-white/10 mb-6 outline-none font-bold text-center">  
        <button onclick="handleAuth()" class="w-full btn-premium py-5 rounded-2xl font-black uppercase">Confirm</button>  
        <p onclick="toggleAuthMode()" id="toggleText" class="mt-4 text-zinc-500 text-xs cursor-pointer uppercase font-bold">New Account? Register</p>  
    </div>  
</div>  <script type="module">  
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";  
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";  
    import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, setDoc, getDoc, getDocs, serverTimestamp, updateDoc, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";  
  
    const firebaseConfig = {  
        apiKey: "AIzaSyDhb5iJxVxIdaXjMIGZP6nmI28DGQSR41k",  
        authDomain: "tommangasite.firebaseapp.com",  
        projectId: "tommangasite",  
        storageBucket: "tommangasite.firebasestorage.app",  
        messagingSenderId: "678188860278",  
        appId: "1:678188860278:web:75ffe0d7ae003ed71df057"  
    };  
  
    const app = initializeApp(firebaseConfig);  
    const auth = getAuth(app);  
    const db = getFirestore(app);  
  
    let userData = null; let isReg = false; let isFreeMode = false; let pressTimer;  
  
    // --- FREE MODE ---  
    onSnapshot(doc(db, "settings", "global"), d => {  
        if(d.exists()) {  
            isFreeMode = d.data().isFreeMode;  
            const btn = document.getElementById("freeModeBtn");  
            btn.innerText = isFreeMode ? "ON" : "OFF";  
            btn.className = isFreeMode ? "px-3 py-1 rounded bg-green-600 text-[8px] font-black" : "px-3 py-1 rounded bg-zinc-700 text-[8px] font-black";  
        }  
    });  
  
    window.toggleFreeMode = async () => { await setDoc(doc(db, "settings", "global"), { isFreeMode: !isFreeMode }, { merge: true }); };  
  
    // --- AUTH ---  
    onAuthStateChanged(auth, user => {  
        if(user) {  
            onSnapshot(doc(db, "users", user.uid), d => {  
                userData = d.data();  
                document.getElementById("userCoin").innerText = "💰 " + (userData.coin || 0);  
                const st = document.getElementById("dropStatus");  
                if(userData.role === 'owner') {  
                    st.innerText = "OWNER"; st.className = "text-[8px] font-black text-red-500 p-3 bg-red-500/10 rounded-xl mb-2";  
                    document.getElementById("adminPanel").classList.remove("hidden");  
                } else {  
                    st.innerText = "MEMBER"; st.className = "text-[8px] font-black text-green-500 p-3 bg-white/5 rounded-xl mb-2";  
                }  
            });  
            document.getElementById("authBtn").classList.add("hidden");  
            document.getElementById("logoutBtn").classList.remove("hidden");  
        }  
    });  
  
    // --- MANGA LOADING ---  
    onSnapshot(query(collection(db, "manga"), orderBy("createdAt", "desc")), snap => {  
        const grid = document.getElementById("mGrid"); grid.innerHTML = "";  
        snap.forEach(d => {  
            const m = d.data();  
            grid.innerHTML += `<div onclick="viewDetail('${d.id}')" class="manga-card cursor-pointer animate-fade">  
                <img src="${m.thumbnail}" class="aspect-[3/4] object-cover w-full">  
                <div class="p-4 text-[10px] font-black uppercase truncate italic">${m.title}</div>  
            </div>`;  
        });  
    });  
  
    // --- MANGA DETAIL & EDIT ---  
    window.viewDetail = async id => {  
        const m = (await getDoc(doc(db, "manga", id))).data();  
        const content = document.getElementById("detailContent");  
        document.getElementById("mDetail").classList.remove("hidden");  
        const isOwner = userData?.role === 'owner';  
          
        content.innerHTML = `  
            <div class="relative md:flex gap-10 items-start mb-12">  
                ${isOwner ? `<button onclick="editMangaUI('${id}')" class="absolute -top-4 -right-4 bg-white/10 hover:bg-red-600 w-12 h-12 rounded-full flex items-center justify-center border border-white/10 text-lg shadow-xl z-20 transition-all">✏️</button>` : ''}  
                <img src="${m.thumbnail}" class="w-48 rounded-[40px] shadow-2xl mx-auto md:mx-0 mb-6 border border-white/5">  
                <div class="flex-1 text-center md:text-left">  
                    <h2 class="text-4xl font-black uppercase italic mb-4 tracking-tighter">${m.title}</h2>  
                    <p class="text-zinc-500 text-sm italic mb-8 leading-relaxed opacity-80">${m.description || 'No summary available.'}</p>  
                    ${isOwner ? `<button onclick="addChapter('${id}')" class="bg-red-600 px-8 py-3 rounded-2xl text-[10px] font-black uppercase">Add Episode +</button>` : ''}  
                </div>  
            </div>  
            <div id="chapList" class="grid gap-3 pt-6 border-t border-white/5"></div>`;  
  
        const chaps = await getDocs(query(collection(db, "manga", id, "chapters"), orderBy("createdAt", "asc")));  
        chaps.forEach(cDoc => {  
            const c = cDoc.data(); const btn = document.createElement("div");  
            btn.className = "bg-white/5 p-5 rounded-2xl flex justify-between items-center cursor-pointer border border-transparent hover:border-red-600 transition-all select-none";  
            btn.onmousedown = () => { pressTimer = setTimeout(() => { if(isOwner) deleteChap(id, cDoc.id); }, 1000); };  
            btn.onmouseup = () => clearTimeout(pressTimer);  
            btn.ontouchstart = () => { pressTimer = setTimeout(() => { if(isOwner) deleteChap(id, cDoc.id); }, 1000); };  
            btn.ontouchend = () => clearTimeout(pressTimer);  
            btn.onclick = () => unlockChapter(id, cDoc.id, c.price);  
            btn.innerHTML = `<span class="font-bold text-xs uppercase">${c.title}</span>  
                             <span class="text-[10px] font-black ${c.price > 0 ? 'text-yellow-500' : 'text-green-500'}">${isFreeMode ? 'FREE' : (c.price > 0 ? '💰 ' + c.price : 'FREE')}</span>`;  
            content.querySelector("#chapList").appendChild(btn);  
        });  
    };  
  
    window.editMangaUI = async (id) => {  
        const m = (await getDoc(doc(db, "manga", id))).data();  
        const content = document.getElementById("detailContent");  
        content.innerHTML = `  
            <div class="bg-white/5 p-8 rounded-[40px] border border-white/10 space-y-6 animate-fade">  
                <h3 class="text-xl font-black uppercase italic text-red-500">Edit Manga Info</h3>  
                <div class="space-y-4">  
                    <input id="edT" value="${m.title}" placeholder="Title" class="w-full bg-black/40 p-4 rounded-2xl border border-white/5 outline-none focus:border-red-600">  
                    <input id="edL" value="${m.thumbnail}" placeholder="Thumbnail Link" class="w-full bg-black/40 p-4 rounded-2xl border border-white/5 outline-none focus:border-red-600">  
                    <textarea id="edD" placeholder="Summary" class="w-full bg-black/40 p-4 rounded-2xl border border-white/5 outline-none focus:border-red-600 h-32">${m.description || ''}</textarea>  </div>  
            <div class="flex gap-3">  
                <button onclick="saveEdit('${id}')" class="flex-1 bg-red-600 py-4 rounded-2xl font-black uppercase text-xs">Save</button>  
                <button onclick="viewDetail('${id}')" class="flex-1 bg-white/5 py-4 rounded-2xl font-black uppercase text-[10px]">Cancel</button>  
            </div>  
        </div>`;  
};  

window.saveEdit = async (id) => {  
    const title = document.getElementById("edT").value;  
    const thumbnail = document.getElementById("edL").value;  
    const description = document.getElementById("edD").value;  
    if(title && thumbnail) {  
        await updateDoc(doc(db, "manga", id), { title, thumbnail, description });  
        notify("Manga Updated!", "✏️"); viewDetail(id);  
    }  
};  

// --- OTHER CORE LOGIC ---  
window.unlockChapter = async (mId, cId, price) => {  
    const canWatch = isFreeMode || price === 0 || userData?.role === 'owner' || userData?.unlockedChapters?.[cId];  
    if(canWatch) return openReader(mId, cId);  
    if(!userData) return showAuth();  
    if(userData.coin < price) return notify("Need more coins!", "⚠️");  
    if(confirm(`Buy for ${price} coins?`)) {  
        await runTransaction(db, async t => {  
            const uRef = doc(db, "users", auth.currentUser.uid);  
            const current = (await t.get(uRef)).data().unlockedChapters || {};  
            current[cId] = true;  
            t.update(uRef, { coin: userData.coin - price, unlockedChapters: current });  
        });  
        openReader(mId, cId);  
    }  
};  

window.openReader = async (mId, cId) => {  
    const c = (await getDoc(doc(db, "manga", mId, "chapters", cId))).data();  
    document.getElementById("rTitle").innerText = c.title;  
    document.getElementById("rImages").innerHTML = c.pages.map(u => `<img src="${u}" class="reader-img" onload="this.style.opacity=1" loading="lazy">`).join('');  
    document.getElementById("reader").classList.remove("hidden");  
};  

window.addChapter = async id => {  
    const t = prompt("Title:"); const p = parseInt(prompt("Price:")) || 0; const u = prompt("Links (comma-separated):");  
    if(t && u) { await addDoc(collection(db, "manga", id, "chapters"), { title: t, price: p, pages: u.split(",").map(i=>i.trim()), createdAt: serverTimestamp() }); viewDetail(id); }  
};  

window.deleteChap = async (mId, cId) => { if(confirm("Delete episode?")) { await deleteDoc(doc(db, "manga", mId, "chapters", cId)); viewDetail(mId); } };  
window.adminAddManga = async () => {  
    const t = document.getElementById("mTitle").value; const l = document.getElementById("mThumb").value;  
    if(t && l) { await addDoc(collection(db, "manga"), { title: t, thumbnail: l, description: document.getElementById("mDesc").value, createdAt: serverTimestamp() }); toggleMangaForm(); }  
};  

window.notify = (m, i="✅") => { const t = document.getElementById("toast"); document.getElementById("toastMsg").innerText = m; document.getElementById("toastIcon").innerText = i; t.classList.remove("opacity-0", "-translate-y-10"); setTimeout(() => t.classList.add("opacity-0", "-translate-y-10"), 3000); };  
window.toggleMenu = () => document.getElementById("userDropdown").classList.toggle("hidden");  
window.toggleMangaForm = () => document.getElementById("mangaForm").classList.toggle("hidden");  
window.closeDetail = () => document.getElementById("mDetail").classList.add("hidden");  
window.closeReader = () => { document.getElementById("reader").classList.add("hidden"); document.getElementById("rImages").innerHTML = ""; };  
window.showAuth = () => document.getElementById("authModal").classList.remove("hidden");  
window.toggleAuthMode = () => { isReg = !isReg; document.getElementById("authTitle").innerText = isReg ? "REGISTER" : "LOGIN"; };  
window.handleAuth = async () => {  
    const u = document.getElementById("uName").value.trim().toLowerCase(); const p = document.getElementById("password").value;  
    try {  
        if(isReg) {  
            const r = await createUserWithEmailAndPassword(auth, `${u}@tommanga.com`, p);  
            await setDoc(doc(db, "users", r.user.uid), { username: u, coin: 0, role: "member", unlockedChapters: {} }); location.reload();  
        } else { await signInWithEmailAndPassword(auth, `${u}@tommanga.com`, p); document.getElementById("authModal").classList.add("hidden"); }  
    } catch(e) { notify("Failed", "❌"); }  
};  
window.buyCoinAction = () => { navigator.clipboard.writeText(auth.currentUser?.uid || "GUEST"); notify("ID Copied!"); setTimeout(() => window.open(`https://t.me/gogolover1514`), 1000); };

</script>  
</body>  
</html>
