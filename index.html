<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Search - Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-10">

    <h1 class="text-3xl font-bold mb-8 text-blue-400">Manga Catalog</h1>

    <div class="relative w-full max-w-md">
        <input 
            type="text" 
            id="searchInput" 
            placeholder="Search manga (e.g. Solo Farming)..." 
            class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-blue-500 transition-all"
        >

        <div id="suggestionBox" class="hidden absolute w-full mt-2 bg-slate-800 border border-slate-700 rounded-lg shadow-xl overflow-hidden z-50">
            <ul id="suggestionList">
                </ul>
        </div>
    </div>

    <div id="mangaDisplay" class="mt-12 grid grid-cols-1 sm:grid-cols-2 gap-6 w-full max-w-4xl">
        </div>

    <script>
        // 1. Supabase Configuration
        const supabaseUrl = 'https://wcjpbkmwkivasitudwcxn.supabase.co';
        const supabaseKey = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjanBia213a2l2YXNpdWR3Y3huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMTA4NzUsImV4cCI6MjA5MjY4Njg3NX0.b7_4x_E7PwO46MYvjUdbUQUHrQBf9bTBw2IOzkPq0Tc';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const searchInput = document.getElementById('searchInput');
        const suggestionBox = document.getElementById('suggestionBox');
        const suggestionList = document.getElementById('suggestionList');
        const mangaDisplay = document.getElementById('mangaDisplay');

        // 2. Function to fetch data from Supabase
        async function fetchManga(query) {
            const { data, error } = await supabase
                .from('manga')
                .select('*')
                .ilike('title', `%${query}%`); // Search logic

            if (error) {
                console.error('Error:', error);
                return [];
            }
            return data;
        }

        // 3. Search Event Listener
        searchInput.addEventListener('input', async (e) => {
            const value = e.target.value.trim();
            suggestionList.innerHTML = '';

            if (value.length > 0) {
                const results = await fetchManga(value);

                if (results.length > 0) {
                    suggestionBox.classList.remove('hidden');
                    results.forEach(manga => {
                        const li = document.createElement('li');
                        li.className = "px-4 py-3 hover:bg-slate-700 cursor-pointer flex items-center gap-3 border-b border-slate-700 last:border-0";
                        li.innerHTML = `
                            <img src="${manga.cover_url}" class="w-10 h-12 object-cover rounded">
                            <div>
                                <p class="font-bold">${manga.title}</p>
                                <p class="text-xs text-slate-400">${manga.genre}</p>
                            </div>
                        `;
                        li.onclick = () => displayManga(manga);
                        suggestionList.appendChild(li);
                    });
                } else {
                    suggestionBox.classList.add('hidden');
                }
            } else {
                suggestionBox.classList.add('hidden');
            }
        });

        // 4. Function to display selected Manga
        function displayManga(manga) {
            suggestionBox.classList.add('hidden');
            searchInput.value = manga.title;
            
            mangaDisplay.innerHTML = `
                <div class="bg-slate-800 p-4 rounded-xl flex gap-4 border border-slate-700 animate-pulse-once">
                    <img src="${manga.cover_url}" class="w-32 h-44 object-cover rounded-lg shadow-lg">
                    <div>
                        <h2 class="text-2xl font-bold text-blue-400">${manga.title}</h2>
                        <span class="inline-block mt-2 bg-blue-900 text-blue-200 text-xs px-2 py-1 rounded">${manga.genre}</span>
                        <p class="mt-4 text-slate-300 text-sm">This manga is now connected to your Supabase database!</p>
                    </div>
                </div>
            `;
        }

        // Close suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target)) suggestionBox.classList.add('hidden');
        });
    </script>

    <style>
        @keyframes pulse-once {
            0% { opacity: 0.5; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-pulse-once { animation: pulse-once 0.3s ease-out; }
    </style>
</body>
</html>
